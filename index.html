// ─── PDF / IMAGE IMPORT ───────────────────────────────────────────────────────
async function extractPDFText(file, onProgress) {
  onProgress?.("Reading PDF…");
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ({ target: { result } }) => {
      onProgress?.("Extracting text from PDF…");
      if (/\/Encrypt[\s/]/.test(result)) {
        reject(new Error("This PDF is password-protected. Please open it in a PDF viewer, print to PDF (to remove the password), and try again."));
        return;
      }
      let text = "";
      const btRe = /BT\b([\s\S]*?)\bET\b/g;
      let block;
      while ((block = btRe.exec(result)) !== null) {
        const content = block[1];
        const litRe = /\(((?:[^\\)]|\\[\s\S])*)\)/g;
        let m;
        while ((m = litRe.exec(content)) !== null) {
          const s = m[1]
            .replace(/\\n/g, "\n").replace(/\\r/g, " ").replace(/\\t/g, " ")
            .replace(/\\\d{3}/g, " ").replace(/\\(.)/g, "$1");
          if (s.trim()) text += s + " ";
        }
        const hexRe = /<([0-9a-fA-F\s]{2,})>/g;
        let h;
        while ((h = hexRe.exec(content)) !== null) {
          const hx = h[1].replace(/\s/g, "");
          let decoded = "";
          for (let i = 0; i + 1 < hx.length; i += 2) {
            const cp = parseInt(hx.substr(i, 2), 16);
            if (cp >= 32 && cp < 127) decoded += String.fromCharCode(cp);
          }
          if (decoded.trim()) text += decoded + " ";
        }
        text += "\n";
      }
      resolve(text.trim());
    };
    reader.onerror = () => reject(new Error("Could not read the file"));
    reader.readAsText(file, "latin1");
  });
}

function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function parseLabText(rawText) {
  const results = {};
  const text = rawText.replace(/[ \t]+/g, " ").toLowerCase();
  for (const { id, kws, range } of LAB_PATTERNS) {
    let found = false;
    for (const kw of kws) {
      const idx = text.indexOf(kw);
      if (idx === -1) continue;
      const snippet = text.slice(idx + kw.length, idx + kw.length + 120);
      const numRe = /(\d+\.\d+|\d+)\s*(?:[hl]{1,2}\b)?/gi;
      let m;
      while ((m = numRe.exec(snippet)) !== null) {
        const val = parseFloat(m[1]);
        if (!isNaN(val) && val >= range[0] && val <= range[1]) {
          if (val > 1900 && val < 2100) continue;
          results[id] = String(val);
          found = true;
          break;
        }
      }
      if (found) break;
    }
  }
  return results;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function computeAnalyses(markers, values) {
  return markers.map(m => {
    const raw = values[m.id];
    if (!raw && raw !== 0) return null;
    const val = parseFloat(raw);
    if (isNaN(val)) return null;
    const result = m.evaluate(val);
    return { ...m, val, result, advice: m.advice[result.status] || [] };
  }).filter(Boolean);
}

function computeScore(analyses) {
  if (!analyses.length) return null;
  const W = { optimal:100, normal:80, borderline:55, insufficient:50, elevated:40, deficient:20, critical_low:25, critical_high:15 };
  return Math.round(analyses.reduce((s,a) => s + (W[a.result.status] ?? 50), 0) / analyses.length);
}

function fmtDate(d) {
  if (!d) return "";
  const [y,m,day] = d.split("-");
  return `${m}/${day}/${y}`;
}

// ─── PRINT REPORT ─────────────────────────────────────────────────────────────
function printReport(profile, analyses, score, sessions, date) {
  const needs = analyses.filter(a => !["optimal","normal"].includes(a.result.status))
    .sort((a,b) => PRIORITY.indexOf(a.result.status)-PRIORITY.indexOf(b.result.status));
  const good = analyses.filter(a => ["optimal","normal"].includes(a.result.status));
  const sc = score ?? "—";
  const scoreHex = score >= 80 ? "#059669" : score >= 60 ? "#d97706" : "#dc2626";

  const html = `<!DOCTYPE html><html><head><title>HealthLens – ${fmtDate(date)}</title>
<style>body{font-family:'Helvetica Neue',Arial,sans-serif;max-width:760px;margin:40px auto;color:#1e293b;font-size:13px;line-height:1.6}h1{font-size:22px;color:#0f172a;margin-bottom:4px}.sub{color:#64748b;margin-bottom:24px;font-size:12px}.score-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.score-num{font-size:40px;font-weight:800;color:${scoreHex}}.score-lbl{font-size:13px;color:#64748b}.pinfo{font-size:12px;color:#64748b}h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:#475569;border-bottom:1px solid #e2e8f0;padding-bottom:6px;margin-top:28px}.marker{margin-bottom:18px;page-break-inside:avoid}.mh{display:flex;align-items:center;gap:8px;margin-bottom:6px}.mn{font-weight:700;font-size:14px}.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}.r{background:#fee2e2;color:#991b1b}.o{background:#ffedd5;color:#9a3412}.y{background:#fef9c3;color:#854d0e}.g{background:#dcfce7;color:#166534}.val{font-size:12px;color:#64748b;margin-bottom:4px}ul{margin:4px 0 0 16px;padding:0}li{margin-bottom:3px}.gl{display:flex;flex-wrap:wrap;gap:8px}.gt{background:#dcfce7;color:#166534;border-radius:20px;font-size:11px;font-weight:600;padding:4px 12px}.disc{margin-top:32px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:12px}</style></head><body>
<h1>🩺 HealthLens Blood Report</h1>
<div class="sub">Generated: ${new Date().toLocaleDateString()} &nbsp;|&nbsp; Test date: ${fmtDate(date)}</div>
<div class="score-box"><div><div class="score-num">${sc}</div><div class="score-lbl">Health Score</div></div>
<div class="pinfo"><div><b>Sex:</b> ${profile.sex==="male"?"Male":profile.sex==="female"?"Female":"Other"}</div><div><b>Age:</b> ${profile.age}</div><div><b>Markers entered:</b> ${analyses.length}</div><div><b>Need attention:</b> ${needs.length}</div></div></div>
${needs.length?`<h2>⚠️ Action Items (${needs.length})</h2>${needs.map(a=>{const bc=["critical_high","deficient"].includes(a.result.status)?"r":["elevated","insufficient","critical_low"].includes(a.result.status)?"o":a.result.status==="borderline"?"y":"g";return`<div class="marker"><div class="mh"><span class="mn">${a.name}</span><span class="badge ${bc}">${a.result.label}</span></div><div class="val">Your value: <b>${a.val} ${a.unit}</b></div><ul>${a.advice.map(t=>`<li>${t}</li>`).join("")}</ul></div>`}).join("")}`:""}
${good.length?`<h2>✅ Optimal / Normal</h2><div class="gl">${good.map(a=>`<span class="gt">${a.name}: ${a.val} ${a.unit}</span>`).join("")}</div>`:""}
${sessions.length>1?`<h2>📈 Historical Tests (${sessions.length})</h2><table style="width:100%;border-collapse:collapse;font-size:11px"><tr style="background:#f8fafc">${["Date",...analyses.map(a=>a.name)].map(h=>`<th style="text-align:left;padding:6px 8px;border-bottom:1px solid #e2e8f0">${h}</th>`).join("")}</tr>${sessions.map(s=>`<tr>${[fmtDate(s.date),...analyses.map(a=>s.values[a.id]||"—")].map(c=>`<td style="padding:5px 8px;border-bottom:1px solid #f1f5f9">${c}</td>`).join("")}</tr>`).join("")}</table>`:""}
<div class="disc">⚠️ This report is for informational purposes only and does not constitute medical advice. Always consult a qualified healthcare provider.</div>
</body></html>`;

  const win = window.open("","_blank");
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

// ─── TREND CHART ──────────────────────────────────────────────────────────────
function TrendChart({ marker, sessions }) {
  const data = sessions
    .filter(s => s.values[marker.id] !== undefined && s.values[marker.id] !== "")
    .map(s => ({ date: fmtDate(s.date), value: parseFloat(s.values[marker.id]) }))
    .filter(d => !isNaN(d.value));

  if (data.length < 2) return (
    <div className="flex items-center justify-center h-32 text-sm text-slate-400 bg-slate-50 rounded-xl border border-slate-100">
      {data.length === 0 ? "No data for this marker" : "Add at least 2 tests to see a trend"}
    </div>
  );

  const [lo, hi] = marker.optimalRange || [null, null];
  return (
    <ResponsiveContainer width="100%" height={180}>
      <LineChart data={data} margin={{ top:8, right:16, bottom:4, left:0 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
        <XAxis dataKey="date" tick={{ fontSize:10, fill:"#94a3b8" }} />
        <YAxis tick={{ fontSize:10, fill:"#94a3b8" }} domain={["auto","auto"]} width={40} />
        <Tooltip contentStyle={{ fontSize:12, borderRadius:8, border:"1px solid #e2e8f0" }}
          formatter={v => [`${v} ${marker.unit}`, marker.name]} />
        {lo !== null && <ReferenceLine y={lo} stroke="#10b981" strokeDasharray="4 2" strokeWidth={1.5} />}
        {hi !== null && hi < 900 && <ReferenceLine y={hi} stroke="#10b981" strokeDasharray="4 2" strokeWidth={1.5} />}
        <Line type="monotone" dataKey="value" stroke="#3b82f6" strokeWidth={2.5}
          dot={{ r:5, fill:"#3b82f6", strokeWidth:2, stroke:"#fff" }} activeDot={{ r:7 }} />
      </LineChart>
    </ResponsiveContainer>
  );
}

            <div className="flex flex-col items-center justify-center py-10 gap-4">
              <div className="relative w-16 h-16">
                <div className="absolute inset-0 rounded-full border-4 border-slate-100" />
                <div className="absolute inset-0 rounded-full border-4 border-blue-500 border-t-transparent animate-spin" />

                <p className="text-xs text-slate-400 mt-1">{pasteText.trim().length} characters pasted</p>

          )}

        {status === "paste" && (
          <div className="px-5 py-4 border-t border-slate-100 flex gap-3 shrink-0 bg-white">

              onClick={() => { if (pasteText.trim()) { onAnalyzeText(pasteText); setPasteText(""); } }}
              className={`flex-1 py-2.5 rounded-xl bg-gradient-to-r from-violet-600 to-blue-600 text-white text-sm font-bold shadow transition-all ${!pasteText.trim() ? "opacity-40 cursor-not-allowed" : "hover:shadow-md"}`}
            >
              🔍 Analyze Text
            </button>
          </div>
        )}
        {status === "done" && found.filter(d => d.checked).length > 0 && (
          <div className="px-5 py-4 border-t border-slate-100 flex gap-3 shrink-0 bg-white">
            <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-colors">Cancel</button>
            <button onClick={onApply}
              className="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-violet-600 text-white text-sm font-bold shadow hover:shadow-md transition-all">
              Apply {found.filter(d => d.checked).length} values →
            </button>
          </div>
        )}
        {(status === "error" || status === "image_only" || (status === "done" && found.filter(d=>d.checked).length === 0)) && (
          <div className="px-5 py-4 border-t border-slate-100 shrink-0">
            <button onClick={onClose} className="w-full py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Close</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [error,    setError]    = useState("");
  const [loading,  setLoading]  = useState(false);
  const [mode,     setMode]     = useState("signin");
  const [resetSent, setResetSent] = useState(false);

  const cleanErr = msg => {
    if (msg.includes("Invalid login credentials")) return "Incorrect email or password.";
    if (msg.includes("User already registered"))   return "An account with this email already exists.";
    if (msg.includes("Password should be"))        return "Password must be at least 6 characters.";
    if (msg.includes("Unable to validate email"))  return "Please enter a valid email address.";
    return msg;
  };

  const handleEmail = async () => {
    if (!email || !password) return;
    setLoading(true); setError("");
    const fn = mode === "signup"
      ? sbClient.auth.signUp({ email, password })
      : sbClient.auth.signInWithPassword({ email, password });
    const { error: e } = await fn;
    if (e) { setError(cleanErr(e.message)); setLoading(false); }
  };

  const handleGoogle = async () => {
    setLoading(true); setError("");
    const { error: e } = await sbClient.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin },
    });
    if (e) { setError(cleanErr(e.message)); setLoading(false); }
  };

  const handleReset = async () => {
    if (!email) { setError("Enter your email address first."); return; }
    setLoading(true); setError("");
    const { error: e } = await sbClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin,
    });
    setLoading(false);
    if (e) setError(cleanErr(e.message));
    else setResetSent(true);
  };

  return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif"}}
      className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-cyan-50 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-3xl shadow-lg mx-auto mb-4">🩺</div>
          <h1 className="text-2xl font-bold text-slate-800">HealthLens</h1>
          <p className="text-sm text-slate-500 mt-1">Track your biomarkers over time</p>
        </div>

        <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-6">
          {resetSent ? (
            <div className="text-center py-4">
              <div className="text-4xl mb-3">📧</div>
              <h3 className="font-semibold text-slate-800 mb-2">Check your inbox</h3>
              <p className="text-sm text-slate-500 mb-4">We sent a password reset link to <strong>{email}</strong>.</p>
              <button onClick={() => setResetSent(false)} className="text-sm text-blue-600 hover:underline">Back to sign in</button>
            </div>
          ) : (
            <>
              {/* Google Sign-In */}
              <button onClick={handleGoogle} disabled={loading}
                className="w-full flex items-center justify-center gap-3 py-3 px-4 border-2 border-slate-200 rounded-xl text-slate-700 font-semibold text-sm hover:border-blue-300 hover:bg-blue-50 transition-all disabled:opacity-50 mb-4">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z"/>
                  <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                  <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
                  <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Continue with Google
              </button>

              <div className="flex items-center gap-3 mb-4">
                <div className="flex-1 h-px bg-slate-200"/>
                <span className="text-xs text-slate-400 font-medium">or email</span>
                <div className="flex-1 h-px bg-slate-200"/>
              </div>

              {/* Sign in / Sign up toggle */}
              <div className="flex gap-1 bg-slate-100 rounded-xl p-1 mb-4">
                {[["signin","Sign In"],["signup","Sign Up"]].map(([m,lbl]) => (
                  <button key={m} onClick={() => { setMode(m); setError(""); }}
                    className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-all ${mode===m?"bg-white text-slate-800 shadow-sm":"text-slate-500 hover:text-slate-700"}`}>
                    {lbl}
                  </button>
                ))}
              </div>

              <div className="space-y-3">
                <input type="email" placeholder="Email address" value={email}
                  onChange={e => setEmail(e.target.value)}
                  className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                <input type="password" placeholder="Password (min 6 chars)" value={password}
                  onChange={e => setPassword(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleEmail()}
                  className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
              </div>

              {error && (
                <div className="mt-3 text-xs text-red-600 bg-red-50 border border-red-200 rounded-xl px-3 py-2">{error}</div>
              )}

              <button onClick={handleEmail} disabled={loading || !email || !password}
                className="w-full mt-4 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-cyan-500 text-white text-sm font-bold shadow hover:shadow-md transition-all disabled:opacity-40">
                {loading ? "Loading…" : mode==="signin" ? "Sign In →" : "Create Account →"}
              </button>

              {mode === "signin" && (
                <button onClick={handleReset} className="w-full mt-2 text-xs text-slate-400 hover:text-slate-600 transition-colors">
                  Forgot password?
                </button>
              )}
            </>
          )}
        </div>
        <p className="text-center text-xs text-slate-400 mt-5 leading-relaxed">
          Your data is private and only accessible to you.
        </p>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function HealthLens() {
  const [profile,        setProfile]        = useState({ sex:"male", age:35 });
  const [sessions,       setSessions]       = useState([]);
  const [currentValues,  setCurrentValues]  = useState({});
  const [currentDate,    setCurrentDate]    = useState(new Date().toISOString().split("T")[0]);
  const [currentLabel,   setCurrentLabel]   = useState("");
  const [mainTab,        setMainTab]        = useState("test");
  const [activeCategory, setActiveCategory] = useState("metabolic");
  const [resultTab,      setResultTab]      = useState("actions");
  const [trendMarkerId,  setTrendMarkerId]  = useState("glucose");
  const [saveMsg,        setSaveMsg]        = useState("");

  // ── Auth & cloud-sync state ────────────────────────────────────────────────
  const [user,           setUser]           = useState(null);
  const [authLoading,    setAuthLoading]    = useState(true);
  const [cloudSyncing,   setCloudSyncing]   = useState(false);

  // Import state
  const fileInputRef = useRef(null);
  const [importState, setImportState] = useState({
    open: false, status: "idle", progress: "", detected: [],
    imageUrl: null, error: null,
  });

  const markers        = useMemo(() => buildMarkers(profile), [profile]);
  const currentMarkers = useMemo(() => markers.filter(m => m.category === activeCategory), [markers, activeCategory]);
  const analyses       = useMemo(() => computeAnalyses(markers, currentValues), [markers, currentValues]);
  const score          = useMemo(() => computeScore(analyses), [analyses]);
  const needsAction    = useMemo(() => analyses.filter(a => !["optimal","normal"].includes(a.result.status)).sort((a,b) => PRIORITY.indexOf(a.result.status)-PRIORITY.indexOf(b.result.status)), [analyses]);
  const lookingGood    = useMemo(() => analyses.filter(a => ["optimal","normal"].includes(a.result.status)), [analyses]);
  const trendMarker    = useMemo(() => markers.find(m => m.id === trendMarkerId), [markers, trendMarkerId]);
  const allMarkersWithData = useMemo(() => markers.filter(m => sessions.some(s => s.values[m.id])), [markers, sessions]);

  const scoreMeta = !score ? null
    : score >= 85 ? { label:"Excellent",      grad:"from-emerald-400 to-teal-500"  }
    : score >= 70 ? { label:"Good",            grad:"from-green-400 to-emerald-500" }
    : score >= 55 ? { label:"Needs Attention", grad:"from-yellow-400 to-orange-400" }
    :               { label:"Requires Action", grad:"from-red-400 to-orange-500"    };

  // ── Auth: listen for Supabase session changes ──────────────────────────────
  useEffect(() => {
    // Get initial session
    sbClient.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        loadUserData(session.user.id);
      } else {
        setAuthLoading(false);
      }
    });

    // Listen for auth changes
    const { data: { subscription } } = sbClient.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        setUser(session.user);
        if (event === "SIGNED_IN") loadUserData(session.user.id);
      } else {
        setUser(null);
        setProfile({ sex:"male", age:35 });
        setSessions([]);
        setCurrentValues({});
        setAuthLoading(false);
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  const loadUserData = async (userId) => {
    try {
      // Load profile
      const { data: profileData } = await sbClient
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      if (profileData) {
        setProfile({ sex: profileData.sex || "male", age: profileData.age || 35 });
      }

      // Load sessions
      const { data: sessionsData } = await sbClient
        .from("lab_sessions")
        .select("*")
        .eq("user_id", userId)
        .order("date", { ascending: true });

      if (sessionsData && sessionsData.length > 0) {
        setSessions(sessionsData.map(s => ({
          id: s.id,
          date: s.date,
          label: s.label,
          values: s.values,
        })));
      }
    } catch(e) {
      console.error("Error loading user data:", e);
    } finally {
      setAuthLoading(false);
    }
  };

  // ── Sync profile to Supabase (debounced 1s) ───────────────────────────────
  useEffect(() => {
    if (!user) return;
    const t = setTimeout(async () => {
      try {
        await sbClient.from("profiles").upsert({
          id: user.id,
          sex: profile.sex,
          age: profile.age,
        });
      } catch(e) { console.error("Profile sync error:", e); }
    }, 1000);
    return () => clearTimeout(t);
  }, [profile, user]);

  // ── Import handlers ────────────────────────────────────────────────────────
  const handleFileChosen = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";

    const isImage = file.type.startsWith("image/");
    const isPDF   = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
    if (!isImage && !isPDF) {
      setImportState({ open:true, status:"error", progress:"", detected:[], imageUrl:null,
        error:"Unsupported file type. Please upload a PDF or an image (JPG, PNG, etc.)." });
      return;
    }

    const imageUrl = isImage ? URL.createObjectURL(file) : null;
    setImportState({ open:true, status:"loading", progress:"Preparing…", detected:[], imageUrl, error:null });

    try {
      let text = "";
      if (isPDF) {
        text = await extractPDFText(file, p => setImportState(s => ({ ...s, progress: p })));
      } else {
        text = await extractImageText(file, p => setImportState(s => ({...s, progress:p})));
      }

      const parsed = parseLabText(text);
      const detected = LAB_PATTERNS.map(p => ({
        id: p.id, name: p.name, unit: p.unit,
        value: parsed[p.id] ?? null,
        checked: !!parsed[p.id],
      }));

      setImportState(s => ({ ...s, status:"done", detected, progress:"" }));
    } catch (err) {
      if (isImage && imageUrl) {
        setImportState(s => ({...s, status:"image_only", error: err.message }));
      } else {
        setImportState(s => ({...s, status:"error", error: err.message }));
      }
    }
  };

  const handleToggle = (id, checked) => {
    setImportState(s => ({
      ...s,
      detected: id === "all"
        ? s.detected.map(d => ({ ...d, checked: d.value !== null ? checked : false }))
        : s.detected.map(d => d.id === id ? { ...d, checked } : d),
    }));
  };

  const applyImport = () => {
    const toApply = importState.detected.filter(d => d.checked && d.value !== null);
    setCurrentValues(prev => {
      const next = { ...prev };
      toApply.forEach(d => { next[d.id] = d.value; });
      return next;
    });
    setImportState(s => ({ ...s, open:false }));
    setMainTab("test");
  };

  const openPasteMode = () => {
    setImportState({ open:true, status:"paste", progress:"", detected:[], imageUrl:null, error:null });
  };

  const handleAnalyzeText = (rawText) => {
    const parsed = parseLabText(rawText);
    const detected = LAB_PATTERNS.map(p => ({
      id: p.id, name: p.name, unit: p.unit,
      value: parsed[p.id] ?? null,
      checked: !!parsed[p.id],
    }));
    setImportState(s => ({ ...s, status:"done", detected, progress:"" }));
  };

  // ── Test actions ───────────────────────────────────────────────────────────
  const saveTest = async () => {
    if (!Object.values(currentValues).some(v => v !== "")) return;
    setCloudSyncing(true);

    try {
      if (user) {
        // Save to Supabase
        const { data, error } = await sbClient.from("lab_sessions").insert({
          user_id: user.id,
          label: currentLabel.trim() || fmtDate(currentDate),
          date: currentDate,
          values: currentValues,
        }).select().single();

        if (error) throw error;

        const newSession = { id: data.id, date: data.date, label: data.label, values: data.values };
        setSessions(prev => [...prev, newSession].sort((a,b) => a.date.localeCompare(b.date)));
      } else {
        // Fallback: local only
        const newSession = { id: Date.now(), date: currentDate, label: currentLabel.trim() || fmtDate(currentDate), values: {...currentValues} };
        setSessions(prev => [...prev, newSession].sort((a,b) => a.date.localeCompare(b.date)));
      }

      setSaveMsg("✓ Saved!"); setCurrentLabel("");
      setTimeout(() => setSaveMsg(""), 2500);
    } catch(e) {
      console.error("Session save error:", e);
      setSaveMsg("⚠️ Save failed");
      setTimeout(() => setSaveMsg(""), 3000);
    } finally {
      setCloudSyncing(false);
    }
  };

  const deleteSession = async (id) => {
    setSessions(prev => prev.filter(x => x.id !== id));
    if (user) {
      try {
        await sbClient.from("lab_sessions").delete().eq("id", id).eq("user_id", user.id);
      } catch(e) { console.error("Session delete error:", e); }
    }
  };

  const NAV = [
    { id:"test",    label:"📋 Current Test" },
    { id:"trends",  label:"📈 Trends" },
    { id:"profile", label:"⚙️ Profile" },
  ];

  // ── Auth guard ─────────────────────────────────────────────────────────────
  if (authLoading) return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif"}}
      className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-cyan-50 flex items-center justify-center">
      <div className="flex flex-col items-center gap-5">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-3xl shadow-lg">🩺</div>
        <div className="w-8 h-8 rounded-full border-4 border-blue-100 border-t-blue-500 animate-spin"/>
      </div>
    </div>
  );
  if (!user) return <LoginScreen />;

  return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif" }} className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-cyan-50">

      <input ref={fileInputRef} type="file" accept=".pdf,image/*"
        id="lab-file-input"
        style={{ position:"absolute", width:1, height:1, opacity:0, overflow:"hidden", clip:"rect(0,0,0,0)", whiteSpace:"nowrap" }}
        onChange={handleFileChosen} />

      {importState.open && (
        <ImportModal
          state={importState}
          onToggle={handleToggle}
          onApply={applyImport}
          onAnalyzeText={handleAnalyzeText}
          onClose={() => setImportState(s => ({...s, open:false}))}
        />
      )}

      {/* ── HEADER ──────────────────────────────────────────────────────────── */}
      <div className="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-20 shadow-sm">
        <div className="max-w-5xl mx-auto">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-lg shadow">🩺</div>
              <div>
                <h1 className="text-lg font-bold text-slate-800 leading-tight">HealthLens</h1>
                <p className="text-xs text-slate-400">
                  {profile.sex === "male" ? "♂ Male" : profile.sex === "female" ? "♀ Female" : "⚧ Other"}, age {profile.age}
                </p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <label
                htmlFor="lab-file-input"
                title="Import PDF or image lab report"
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-600 text-xs font-semibold hover:bg-slate-50 transition-all cursor-pointer"
              >
                <span className="text-base leading-none">📥</span>
                <span className="hidden sm:inline">Upload</span>
              </label>
              <button
                onClick={openPasteMode}
                title="Paste copied text from your lab report"
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border-2 border-dashed border-violet-300 bg-violet-50 text-violet-700 text-xs font-semibold hover:bg-violet-100 hover:border-violet-400 transition-all"
              >
                <span className="text-base leading-none">📋</span>
                <span className="hidden sm:inline">Paste Lab Text</span>
                <span className="sm:hidden">Paste</span>
              </button>

              {analyses.length > 0 && mainTab === "test" && (
                <button onClick={() => printReport(profile, analyses, score, sessions, currentDate)}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-800 text-white text-xs font-semibold rounded-lg hover:bg-slate-700 transition-all shadow-sm">
                  🖨️ <span className="hidden sm:inline">Export PDF</span>
                </button>
              )}
              {score !== null && (
                <div className={`text-center px-3 py-1 rounded-xl bg-gradient-to-br ${scoreMeta.grad} text-white shadow-md`}>
                  <div className="text-xl font-bold leading-none">{score}</div>
                  <div className="text-xs font-medium opacity-90">{scoreMeta.label}</div>
                </div>
              )}

              {/* User avatar + sign out */}
              <div className="flex items-center gap-2 border-l border-slate-100 pl-3 ml-1">
                <div className="w-7 h-7 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex items-center justify-center text-white text-xs font-bold shrink-0">
                  {(user.email || "U")[0].toUpperCase()}
                </div>
                <span className="text-xs text-slate-500 hidden md:block max-w-[110px] truncate">
                  {user.email}
                </span>
                <button onClick={() => sbClient.auth.signOut()}
                  className="text-xs text-slate-400 hover:text-slate-700 border border-slate-200 rounded-lg px-2.5 py-1 hover:bg-slate-100 transition-all whitespace-nowrap">
                  Sign out
                </button>
              </div>
            </div>
          </div>

          {/* Nav */}
          <div className="flex gap-1">
            {NAV.map(t => (
              <button key={t.id} onClick={() => setMainTab(t.id)}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${mainTab === t.id ? "bg-blue-600 text-white shadow-sm" : "text-slate-500 hover:text-slate-700 hover:bg-slate-100"}`}>
                {t.label}
                {t.id==="trends" && sessions.length>0 && <span className="ml-1.5 bg-blue-100 text-blue-700 text-xs px-1.5 py-0.5 rounded-full">{sessions.length}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-4 py-5">

        {/* ══ CURRENT TEST ════════════════════════════════════════════════════ */}
        {mainTab === "test" && (
          <div className="flex flex-col lg:flex-row gap-5">
            <div className="flex-1 min-w-0">
              <div className="flex flex-wrap gap-2 mb-4">
                {CATEGORIES.map(cat => {
                  const catHasIssue = markers.filter(m=>m.category===cat.id).some(m => {
                    const raw=currentValues[m.id]; if(!raw) return false;
                    const v=parseFloat(raw); if(isNaN(v)) return false;
                    return !["optimal","normal"].includes(m.evaluate(v).status);
                  });
                  const catHasAny = markers.filter(m=>m.category===cat.id).some(m => currentValues[m.id]);
                  return (
                    <button key={cat.id} onClick={() => setActiveCategory(cat.id)}
                      className={`relative px-3 py-1.5 rounded-full text-sm font-medium transition-all ${activeCategory===cat.id?"bg-blue-600 text-white shadow-md shadow-blue-200":"bg-white text-slate-600 border border-slate-200 hover:border-blue-300 hover:text-blue-600"}`}>
                      {cat.emoji} {cat.label}
                      {catHasAny && <span className={`absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full border-2 border-white ${catHasIssue?"bg-orange-500":"bg-emerald-500"}`} />}
                    </button>
                  );
                })}
              </div>

              {!Object.values(currentValues).some(v=>v) && (
                <div className="mb-4 rounded-2xl border-2 border-dashed border-violet-200 bg-violet-50 p-4">
                  <div className="text-center mb-3">
                    <div className="text-2xl mb-1">📋</div>
                    <div className="text-sm font-semibold text-violet-700">Import your lab report</div>
                    <div className="text-xs text-violet-500 mt-0.5">Auto-detects values · English &amp; Spanish · Quest, LabCorp and more</div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={openPasteMode}
                      className="flex-1 py-2 rounded-xl bg-violet-600 text-white text-xs font-bold hover:bg-violet-700 transition-colors">
                      📋 Paste Lab Text
                    </button>
                    <label htmlFor="lab-file-input"
                      className="flex-1 py-2 rounded-xl border border-violet-300 text-violet-700 text-xs font-semibold text-center hover:bg-violet-100 transition-colors cursor-pointer">
                      📥 Upload PDF / Image
                    </label>
                  </div>
                  <p className="text-xs text-violet-400 text-center mt-2">Paste works best — open PDF, Ctrl+A, Ctrl+C, paste here</p>
                </div>
              )}

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {currentMarkers.map(m => {
                  const raw = currentValues[m.id];
                  const hasVal = raw !== undefined && raw !== "";
                  const val = hasVal ? parseFloat(raw) : null;
                  const result = (hasVal && !isNaN(val)) ? m.evaluate(val) : null;
                  const style = result ? (STATUS_STYLES[result.status] || STATUS_STYLES.borderline) : null;
                  return (
                    <div key={m.id} className={`rounded-xl p-4 border-2 transition-all duration-200 shadow-sm ${style?`${style.border} ${style.bg}`:"border-slate-100 bg-white"}`}>
                      <div className="flex items-center justify-between mb-2">
                        <label className="text-sm font-semibold text-slate-700">{m.name}</label>
                        {result && <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${style.badge}`}>{style.icon} {result.label}</span>}
                      </div>
                      <div className="flex items-center gap-2">
                        <input type="number" value={raw??""} onChange={e => setCurrentValues(p => ({...p,[m.id]:e.target.value}))}
                          placeholder={m.placeholder} step="any"
                          className="flex-1 min-w-0 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white" />
                        <span className="text-xs text-slate-400 whitespace-nowrap shrink-0">{m.unit}</span>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="mt-4 bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex flex-col sm:flex-row items-start sm:items-center gap-3">
                <div className="flex items-center gap-2 flex-1 flex-wrap">
                  <span className="text-sm text-slate-500 shrink-0">Test date:</span>
                  <input type="date" value={currentDate} onChange={e => setCurrentDate(e.target.value)}
                    className="border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
                  <input type="text" value={currentLabel} onChange={e => setCurrentLabel(e.target.value)} placeholder="Label (optional)"
                    className="flex-1 min-w-0 border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
                </div>
                <div className="flex gap-2 items-center">
                  {saveMsg     && <span className="text-xs text-emerald-600 font-semibold">{saveMsg}</span>}
                  {cloudSyncing && <span className="text-xs text-blue-500 font-medium">☁️ Syncing…</span>}
                  <button onClick={() => setCurrentValues({})} className="text-xs text-slate-400 hover:text-slate-600 border border-slate-200 rounded-lg px-3 py-1.5 transition-all">↺ Clear</button>
                  <button onClick={saveTest} className="text-xs font-semibold bg-blue-600 text-white rounded-lg px-4 py-1.5 hover:bg-blue-700 transition-all shadow-sm">💾 Save Test</button>
                </div>
              </div>
            </div>

            {/* Right: Results */}
            <div className="lg:w-80 shrink-0 space-y-4">
              {analyses.length === 0 ? (
                <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 text-center">
                  <div className="text-4xl mb-3">📋</div>
                  <h3 className="font-semibold text-slate-700 mb-2">Enter Your Lab Values</h3>
                  <p className="text-sm text-slate-500 leading-relaxed">Import a PDF/image or enter values manually. Reference ranges adjust for your sex and age.</p>
                </div>
              ) : (
                <>
                  <div className={`rounded-2xl p-4 bg-gradient-to-br ${scoreMeta.grad} text-white shadow-lg`}>
                    <div className="flex items-center justify-between">
                      <div>
                        <div className="text-sm font-medium opacity-90">Health Score</div>
                        <div className="text-5xl font-bold mt-0.5">{score}</div>
                        <div className="text-sm font-semibold opacity-90 mt-1">{scoreMeta.label}</div>
                      </div>
                      <div className="text-right text-sm opacity-85 space-y-1">
                        <div>{analyses.length} markers</div>
                        <div>{lookingGood.length} optimal/normal</div>
                        <div className="font-semibold">{needsAction.length} need attention</div>
                      </div>
                    </div>
                  </div>

                  {needsAction.length > 0 && (
                    <div className="flex rounded-xl bg-slate-100 p-1 gap-1">
                      {[["actions",`⚠️ Actions (${needsAction.length})`],["good",`✅ Good (${lookingGood.length})`]].map(([id,lbl]) => (
                        <button key={id} onClick={() => setResultTab(id)}
                          className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-all ${resultTab===id?"bg-white text-slate-800 shadow-sm":"text-slate-500 hover:text-slate-700"}`}>
                          {lbl}
                        </button>
                      ))}
                    </div>
                  )}

                  {(resultTab==="actions"||needsAction.length===0) && needsAction.length>0 && (
                    <div className="bg-white rounded-2xl border border-slate-100 shadow-sm divide-y divide-slate-50 overflow-hidden">
                      {needsAction.map(a => {
                        const style = STATUS_STYLES[a.result.status]||STATUS_STYLES.borderline;
                        return (
                          <div key={a.id} className="p-4">
                            <div className="flex items-center gap-2 mb-1.5">
                              <div className={`w-2 h-2 rounded-full ${style.dot} shrink-0`} />
                              <span className="text-sm font-bold text-slate-800">{a.name}</span>
                              <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ml-auto shrink-0 ${style.badge}`}>{a.result.label}</span>
                            </div>
                            <div className="text-xs text-slate-400 mb-2 ml-4">Value: <span className="font-semibold text-slate-600">{a.val} {a.unit}</span></div>
                            <ul className="space-y-1.5 ml-4">
                              {a.advice.map((tip,i) => (
                                <li key={i} className="text-xs text-slate-600 flex items-start gap-1.5">
                                  <span className="shrink-0 mt-0.5">{getActionIcon(tip)}</span>
                                  <span className="leading-relaxed">{tip}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {(resultTab==="good"||needsAction.length===0) && lookingGood.length>0 && (
                    <div className="bg-emerald-50 rounded-2xl border border-emerald-100 p-4">
                      <h3 className="font-semibold text-emerald-700 mb-3">✅ Looking Great</h3>
                      <div className="space-y-2">
                        {lookingGood.map(a => (
                          <div key={a.id} className="flex items-center gap-2 text-sm">
                            <span>{STATUS_STYLES[a.result.status].icon}</span>
                            <span className="text-emerald-800 font-medium">{a.name}</span>
                            <span className="ml-auto text-xs text-emerald-600 font-semibold">{a.val} {a.unit}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="rounded-xl border border-amber-100 bg-amber-50 p-3">
                    <p className="text-xs text-amber-700 leading-relaxed">⚠️ <strong>Informational only.</strong> Does not replace medical advice. Always consult a qualified healthcare provider.</p>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* ══ TRENDS ══════════════════════════════════════════════════════════ */}
        {mainTab === "trends" && (
          <div className="flex flex-col lg:flex-row gap-5">
            <div className="flex-1 min-w-0">
              {sessions.length === 0 ? (
                <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-10 text-center">
                  <div className="text-5xl mb-4">📈</div>
                  <h3 className="font-semibold text-slate-700 mb-2">No saved tests yet</h3>
                  <p className="text-sm text-slate-500">Save tests from the <strong>Current Test</strong> tab to track your biomarkers over time.</p>
                </div>
              ) : (
                <>
                  <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-4">
                    <div className="flex items-center gap-3 flex-wrap">
                      <span className="text-sm font-semibold text-slate-600">Select marker:</span>
                      <select value={trendMarkerId} onChange={e => setTrendMarkerId(e.target.value)}
                        className="border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white">
                        {CATEGORIES.map(cat => (
                          <optgroup key={cat.id} label={`${cat.emoji} ${cat.label}`}>
                            {markers.filter(m=>m.category===cat.id).map(m => (
                              <option key={m.id} value={m.id}>{m.name} ({m.unit})</option>
                            ))}
                          </optgroup>
                        ))}
                      </select>
                    </div>
                  </div>

                  {trendMarker && (
                    <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-4">
                      <div className="flex items-center justify-between mb-4">
                        <h3 className="font-bold text-slate-800">{trendMarker.name}</h3>
                        <span className="text-xs text-slate-400">{trendMarker.unit}</span>
                      </div>
                      <TrendChart marker={trendMarker} sessions={sessions} />
                    </div>
                  )}

                  {allMarkersWithData.length > 1 && (
                    <div>
                      <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">All Tracked Markers</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {allMarkersWithData.filter(m=>m.id!==trendMarkerId).map(m => (
                          <button key={m.id} onClick={() => setTrendMarkerId(m.id)}
                            className="bg-white rounded-xl border border-slate-100 p-3 text-left hover:border-blue-200 hover:shadow-md transition-all shadow-sm">
                            <div className="text-xs font-semibold text-slate-600 mb-2">{m.name} <span className="text-slate-400 font-normal">({m.unit})</span></div>
                            <TrendChart marker={m} sessions={sessions} />
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>

            <div className="lg:w-72 shrink-0">
              <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                <div className="px-4 py-3 border-b border-slate-50 flex items-center justify-between">
                  <h3 className="font-semibold text-slate-700">Saved Tests ({sessions.length})</h3>
                </div>
                {sessions.length === 0 ? (
                  <div className="p-6 text-center text-sm text-slate-400">No saved tests yet</div>
                ) : (
                  <div className="divide-y divide-slate-50 max-h-96 overflow-y-auto">
                    {[...sessions].reverse().map(s => {
                      const sA = computeAnalyses(markers, s.values);
                      const sS = computeScore(sA);
                      const sC = !sS?"text-slate-400":sS>=80?"text-emerald-600":sS>=60?"text-yellow-600":"text-red-600";
                      return (
                        <div key={s.id} className="p-3 hover:bg-slate-50 transition-colors">
                          <div className="flex items-center justify-between mb-1">
                            <div>
                              <div className="text-sm font-semibold text-slate-700">{s.label}</div>
                              <div className="text-xs text-slate-400">{fmtDate(s.date)}</div>
                            </div>
                            {sS && <div className={`text-lg font-bold ${sC}`}>{sS}</div>}
                          </div>
                          <div className="flex gap-2 mt-2">
                            <button onClick={() => { setCurrentValues({...s.values}); setCurrentDate(s.date); setMainTab("test"); }}
                              className="flex-1 text-xs font-medium text-blue-600 border border-blue-200 rounded-lg py-1 hover:bg-blue-50 transition-colors">Load</button>
                            <button onClick={() => deleteSession(s.id)}
                              className="text-xs font-medium text-slate-400 border border-slate-200 rounded-lg px-3 py-1 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors">✕</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ══ PROFILE ══════════════════════════════════════════════════════════ */}
        {mainTab === "profile" && (
          <div className="max-w-lg">
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
              <h2 className="text-lg font-bold text-slate-800 mb-1">Your Profile</h2>
              <p className="text-sm text-slate-500 mb-6">Reference ranges adjust automatically based on your biological sex and age.</p>

              <div className="mb-6">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Biological sex</label>
                <div className="flex gap-3">
                  {[["male","♂ Male"],["female","♀ Female"],["other","⚧ Other"]].map(([val,lbl]) => (
                    <button key={val} onClick={() => setProfile(p => ({...p,sex:val}))}
                      className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border-2 transition-all ${profile.sex===val?"border-blue-500 bg-blue-50 text-blue-700":"border-slate-200 text-slate-500 hover:border-blue-200"}`}>
                      {lbl}
                    </button>
                  ))}
                </div>
              </div>

              <div className="mb-6">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Age: <span className="text-blue-600">{profile.age} years</span></label>
                <input type="range" min={18} max={90} value={profile.age} onChange={e => setProfile(p => ({...p,age:Number(e.target.value)}))}
                  className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer accent-blue-600" />
                <div className="flex justify-between text-xs text-slate-400 mt-1"><span>18</span><span>90</span></div>
              </div>

              <div className="bg-slate-50 rounded-xl p-4 space-y-2 text-xs text-slate-600">
                <div className="text-sm font-semibold text-slate-600 mb-2">What gets personalized for you:</div>
                <div className="flex gap-2"><span className="text-blue-500">♀</span><span><strong>Ferritin:</strong> Lower normal ranges for females</span></div>
                <div className="flex gap-2"><span className="text-blue-500">♀</span><span><strong>HDL:</strong> Higher minimum threshold for females (≥50 vs ≥40 mg/dL)</span></div>
                <div className="flex gap-2"><span className="text-blue-500">♀</span><span><strong>Creatinine & ALT:</strong> Lower upper limits for females</span></div>
                <div className="flex gap-2"><span className="text-amber-500">60+</span><span><strong>TSH:</strong> Upper normal rises to 5.5 mIU/L after age 60</span></div>
                <div className="flex gap-2"><span className="text-amber-500">60+</span><span><strong>Vitamin D:</strong> Optimal shifts to 60–80 ng/mL (reduced skin synthesis)</span></div>
                <div className="flex gap-2"><span className="text-amber-500">60+</span><span><strong>eGFR:</strong> Natural decline noted in recommendations</span></div>
              </div>
              <div className="mt-4 p-3 bg-emerald-50 rounded-xl border border-emerald-100">
                <p className="text-xs text-emerald-700">✅ Profile saved automatically to your account. All ranges update instantly.</p>
              </div>

              {/* Account section */}
              <div className="mt-6 pt-6 border-t border-slate-100">
                <h3 className="text-sm font-semibold text-slate-700 mb-1">Account</h3>
                <p className="text-xs text-slate-400 mb-3">{user.email}</p>
                <button onClick={() => sbClient.auth.signOut()}
                  className="w-full py-2 rounded-xl border border-slate-200 text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-colors">
                  Sign out
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HealthLens />);
  </script>
</body>
</html>
