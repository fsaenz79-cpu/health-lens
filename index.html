// ─── IMPORT MODAL ─────────────────────────────────────────────────────────────
function ImportModal({ state, onToggle, onApply, onAnalyzeText, onClose }) {
  const { status, progress, detected, imageUrl, error } = state;
  const found    = detected.filter(d => d.value !== null);
  const notFound = detected.filter(d => d.value === null);
  const [pasteText, setPasteText] = useState("");

  const subtitle =
    status === "loading" ? progress || "Processing…"
    : status === "done" ? `Detected ${found.length} of ${detected.length} markers`
    : status === "image_only" ? "Image loaded — enter values manually"
    : status === "paste" ? "Paste your lab report text below"
    : status === "error" ? "Could not read file"
    : "Preparing…";

  return (
    <div style={{ position:"fixed", inset:0, zIndex:50, display:"flex", alignItems:"center", justifyContent:"center", padding:16, background:"rgba(0,0,0,0.85)" }}>
      <div style={{ background:"#111", borderRadius:20, border:`1px solid ${C.border}`, width:"100%", maxWidth:440, maxHeight:"90vh", display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <div style={{ padding:"16px 20px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:500 }}>Import lab report</div>
            <div style={{ fontSize:12, color:"#555", marginTop:2 }}>{subtitle}</div>
          </div>
          <button onClick={onClose} style={{ width:28, height:28, borderRadius:"50%", background:"#1a1a1a", border:"none", color:"#666", cursor:"pointer", fontSize:14 }}>✕</button>
        </div>
        <div style={{ overflowY:"auto", flex:1, padding:20 }}>
          {status === "loading" && (
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"40px 0", gap:16 }}>
              <div style={{ width:48, height:48, borderRadius:"50%", border:`3px solid ${C.border}`, borderTopColor:C.teal, animation:"spin 1s linear infinite" }} />
              <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
              <div style={{ fontSize:13, color:"#666", textAlign:"center" }}>{progress || "Analyzing your lab report…"}</div>
            </div>
          )}
          {status === "error" && (
            <div style={{ background:"#FF453A15", border:`1px solid #FF453A30`, borderRadius:12, padding:"12px 14px", fontSize:13, color:C.red }}>
              <div style={{ fontWeight:500, marginBottom:4 }}>Could not read file</div>
              <div style={{ color:"#FF453A99" }}>{error}</div>
            </div>
          )}
          {status === "image_only" && imageUrl && (
            <div>
              <div style={{ background:"#F5830015", border:`1px solid #F5830030`, borderRadius:12, padding:"10px 12px", fontSize:12, color:C.orange, marginBottom:12 }}>
                {error}
              </div>
              <img src={imageUrl} alt="Lab report" style={{ width:"100%", borderRadius:12 }} />
            </div>
          )}
          {status === "done" && (
            <div>
              {found.length > 0 && (
                <>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                    <div style={{ fontSize:13, fontWeight:500 }}>Detected values <span style={{ color:"#444" }}>({found.length})</span></div>
                    <div style={{ display:"flex", gap:12, fontSize:12 }}>
                      <button onClick={() => onToggle("all",true)} style={{ color:C.teal, background:"none", border:"none", cursor:"pointer", padding:0 }}>All</button>
                      <button onClick={() => onToggle("all",false)} style={{ color:"#444", background:"none", border:"none", cursor:"pointer", padding:0 }}>None</button>
                    </div>
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:16 }}>
                    {found.map(d => (
                      <label key={d.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 12px", borderRadius:10, border:`1px solid ${d.checked ? C.teal+"40":"#1e1e1e"}`, background:d.checked ? C.teal+"08":"transparent", cursor:"pointer" }}>
                        <input type="checkbox" checked={d.checked} onChange={e => onToggle(d.id, e.target.checked)} style={{ accentColor:C.teal }} />
                        <span style={{ flex:1, fontSize:13 }}>{d.name}</span>
                        <span style={{ fontSize:13, fontWeight:500, color:C.teal }}>{d.value} <span style={{ fontSize:11, color:"#444" }}>{d.unit}</span></span>
                      </label>
                    ))}
                  </div>
                </>
              )}
              {found.length === 0 && (
                <div style={{ background:"#F5830015", border:`1px solid #F5830030`, borderRadius:12, padding:"12px 14px", fontSize:13, color:C.orange }}>
                  No values detected. Try the paste method — open your PDF, Ctrl+A, Ctrl+C, then paste.
                </div>
              )}
              {notFound.length > 0 && (
                <details style={{ marginTop:8 }}>
                  <summary style={{ fontSize:12, color:"#444", cursor:"pointer" }}>Not detected ({notFound.length})</summary>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:8 }}>
                    {notFound.map(d => <span key={d.id} style={{ fontSize:11, color:"#444", background:"#1a1a1a", borderRadius:6, padding:"2px 8px" }}>{d.name}</span>)}
                  </div>
                </details>
              )}
            </div>
          )}
          {status === "paste" && (
            <div>
              <p style={{ fontSize:12, color:"#555", marginBottom:12, lineHeight:1.6 }}>
                Open your PDF, press <strong style={{ color:"#888" }}>Ctrl+A</strong> then <strong style={{ color:"#888" }}>Ctrl+C</strong>, paste below. Works with Spanish and English lab reports.
              </p>
              <textarea
                style={{ width:"100%", height:200, background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:10, padding:12, fontSize:12, color:"#ccc", fontFamily:"monospace", resize:"none" }}
                placeholder="Paste your lab report text here…"
                value={pasteText}
                onChange={e => setPasteText(e.target.value)}
              />
            </div>
          )}
        </div>
        <div style={{ padding:"12px 20px", borderTop:`1px solid ${C.border}`, display:"flex", gap:8 }}>
          <button onClick={onClose} style={{ flex:1, padding:"10px 0", borderRadius:10, background:"transparent", border:`1px solid ${C.border}`, color:"#666", cursor:"pointer", fontSize:13 }}>Cancel</button>
          {status === "paste" && (
            <button
              onClick={() => {
                if (pasteText.trim()) {
                  const parsed = parseLabText(pasteText);
                  const detected = LAB_PATTERNS.map(p=>({ id:p.id, name:p.name, unit:p.unit, value:parsed[p.id]??null, checked:!!parsed[p.id] }));
                  onAnalyzeText(detected);
                  setPasteText("");
                }
              }}
              style={{ flex:1, padding:"10px 0", borderRadius:10, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:13, fontWeight:500 }}
            >Analyze</button>
          )}
          {status === "done" && found.filter(d=>d.checked).length > 0 && (
            <button onClick={onApply} style={{ flex:1, padding:"10px 0", borderRadius:10, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:13, fontWeight:500 }}>
              Apply {found.filter(d=>d.checked).length} values
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [mode, setMode]         = useState("signin");
  const [resetSent, setResetSent] = useState(false);

  const cleanErr = msg => {
    if (msg.includes("Invalid login credentials")) return "Incorrect email or password.";
    if (msg.includes("User already registered"))   return "An account with this email already exists.";
    if (msg.includes("Password should be"))        return "Password must be at least 6 characters.";
    return msg;
  };

  const handleEmail = async () => {
    if (!email || !password) return;
    setLoading(true); setError("");
    const fn = mode === "signup"
      ? sbClient.auth.signUp({ email, password })
      : sbClient.auth.signInWithPassword({ email, password });
    const { error:e } = await fn;
    if (e) { setError(cleanErr(e.message)); setLoading(false); }
  };

  const handleGoogle = async () => {
    setLoading(true); setError("");
    const { error:e } = await sbClient.auth.signInWithOAuth({ provider:"google", options:{ redirectTo:window.location.origin, skipBrowserRedirect:false } });
    if (e) { setError(cleanErr(e.message)); setLoading(false); }
  };

  const handleReset = async () => {
    if (!email) { setError("Enter your email first."); return; }
    setLoading(true); setError("");
    const { error:e } = await sbClient.auth.resetPasswordForEmail(email, { redirectTo:window.location.origin });
    setLoading(false);
    if (e) setError(cleanErr(e.message)); else setResetSent(true);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:16, background:C.bg }}>
      <div style={{ width:"100%", maxWidth:360 }}>
        <div style={{ textAlign:"center", marginBottom:40 }}>
          <div style={{ width:56, height:56, borderRadius:16, background:C.teal+"18", border:`1px solid ${C.teal}30`, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", fontSize:24 }}>◎</div>
          <div style={{ fontSize:26, fontWeight:500, letterSpacing:"-0.5px" }}>Innermark</div>
          <div style={{ fontSize:13, color:"#444", marginTop:6 }}>Know your body from the inside</div>
        </div>
        <div style={{ background:C.card, borderRadius:20, border:`1px solid ${C.border}`, padding:24 }}>
          {resetSent ? (
            <div style={{ textAlign:"center", padding:"16px 0" }}>
              <div style={{ fontSize:32, marginBottom:12 }}>✉</div>
              <div style={{ fontWeight:500, marginBottom:8 }}>Check your inbox</div>
              <div style={{ fontSize:13, color:"#555", marginBottom:16 }}>Sent reset link to <span style={{ color:"#888" }}>{email}</span></div>
              <button onClick={() => setResetSent(false)} style={{ color:C.teal, background:"none", border:"none", cursor:"pointer", fontSize:13 }}>Back to sign in</button>
            </div>
          ) : (
            <>
              <button onClick={handleGoogle} disabled={loading} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:10, padding:"11px 0", borderRadius:12, background:"transparent", border:`1px solid ${C.border}`, color:"#ccc", cursor:"pointer", fontSize:14, marginBottom:16 }}>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z"/>
                  <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                  <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
                  <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Continue with Google
              </button>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
                <div style={{ flex:1, height:"0.5px", background:C.border }} />
                <span style={{ fontSize:11, color:"#333" }}>or email</span>
                <div style={{ flex:1, height:"0.5px", background:C.border }} />
              </div>
              <div style={{ display:"flex", gap:4, background:"#0a0a0a", borderRadius:10, padding:4, marginBottom:16 }}>
                {[["signin","Sign in"],["signup","Sign up"]].map(([m,l]) => (
                  <button key={m} onClick={() => { setMode(m); setError(""); }} style={{ flex:1, padding:"7px 0", borderRadius:8, border:"none", background:mode===m?"#1a1a1a":"transparent", color:mode===m?"#fff":"#444", cursor:"pointer", fontSize:13 }}>{l}</button>
                ))}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                <input type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)}
                  style={{ width:"100%", padding:"11px 14px", borderRadius:10, background:"#0a0a0a", border:`1px solid ${C.border}`, color:"#fff", fontSize:14 }} />
                <input type="password" placeholder="Password (min 6 chars)" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleEmail()}
                  style={{ width:"100%", padding:"11px 14px", borderRadius:10, background:"#0a0a0a", border:`1px solid ${C.border}`, color:"#fff", fontSize:14 }} />
              </div>
              {error && <div style={{ marginTop:10, padding:"8px 12px", borderRadius:8, background:"#FF453A15", color:C.red, fontSize:12 }}>{error}</div>}
              <button onClick={handleEmail} disabled={loading||!email||!password}
                style={{ width:"100%", marginTop:14, padding:"11px 0", borderRadius:12, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:14, fontWeight:500, opacity:(!email||!password||loading)?0.4:1 }}>
                {loading ? "Loading…" : mode==="signin" ? "Sign in" : "Create account"}
              </button>
              {mode==="signin" && (
                <button onClick={handleReset} style={{ width:"100%", marginTop:10, color:"#333", background:"none", border:"none", cursor:"pointer", fontSize:12 }}>Forgot password?</button>
              )}
            </>
          )}
        </div>
        <div style={{ textAlign:"center", fontSize:11, color:"#333", marginTop:16 }}>Your data is private and only accessible to you</div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Innermark() {
  const [profile, setProfile] = useState({
    sex:"male", birthDate:"", height:"", weight:"",
    bloodType:"", city:"", exerciseHours:0, dietType:"balanced",
    altitudeM:0, altitudeSource:"standard", resolvedCity:""
  });
  const [sessions, setSessions]           = useState([]);
  const [currentValues, setCurrentValues] = useState({});
  const [currentDate, setCurrentDate]     = useState(new Date().toISOString().split("T")[0]);
  const [currentLabel, setCurrentLabel]   = useState("");
  const [mainTab, setMainTab]             = useState("dashboard");
  const [activeCategory, setActiveCategory] = useState("metabolic");
  const [trendMarkerId, setTrendMarkerId] = useState("glucose");
  const [saveMsg, setSaveMsg]             = useState("");
  const [cloudSyncing, setCloudSyncing]   = useState(false);
  const [user, setUser]                   = useState(null);
  const [authLoading, setAuthLoading]     = useState(true);
  const [importState, setImportState]     = useState({ open:false, status:"idle", progress:"", detected:[], imageUrl:null, error:null });
  const [showTestForm, setShowTestForm]   = useState(false);
  const [altitudeLoading, setAltitudeLoading] = useState(false);
  const [selectedMarker, setSelectedMarker]     = useState(null);
  const [cityInput, setCityInput]         = useState("");

  const fileInputRef = useRef(null);

  const age        = useMemo(() => calcAge(profile.birthDate), [profile.birthDate]);
  const fullProfile = useMemo(() => ({ ...profile, age }), [profile, age]);
  const markers    = useMemo(() => buildMarkers(fullProfile), [fullProfile]);
  const currentMarkers = useMemo(() => markers.filter(m=>m.category===activeCategory), [markers, activeCategory]);
  const analyses   = useMemo(() => computeAnalyses(markers, currentValues), [markers, currentValues]);
  const score      = useMemo(() => computeScore(analyses), [analyses]);
  const needsAction = useMemo(() => analyses.filter(a=>!["optimal","normal"].includes(a.result.status)).sort((a,b)=>PRIORITY.indexOf(a.result.status)-PRIORITY.indexOf(b.result.status)), [analyses]);
  const lookingGood = useMemo(() => analyses.filter(a=>["optimal","normal"].includes(a.result.status)), [analyses]);
  const trendMarker = useMemo(() => markers.find(m=>m.id===trendMarkerId), [markers, trendMarkerId]);
  const allMarkersWithData = useMemo(() => markers.filter(m=>sessions.some(s=>s.values[m.id])), [markers, sessions]);

  // Auth
  useEffect(() => {
    const initAuth = async () => {
      await new Promise(r => setTimeout(r, 300));
      const { data:{ session } } = await sbClient.auth.getSession();
      if (session?.user) { setUser(session.user); loadUserData(session.user.id); }
      else setAuthLoading(false);
    };
    initAuth();
    const { data:{ subscription } } = sbClient.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        setUser(session.user);
        if (event==="SIGNED_IN") loadUserData(session.user.id);
      } else {
        setUser(null);
        setProfile({ sex:"male", birthDate:"", height:"", weight:"", bloodType:"", city:"", exerciseHours:0, dietType:"balanced", altitudeM:0, altitudeSource:"standard", resolvedCity:"" });
        setSessions([]); setCurrentValues({}); setAuthLoading(false);
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Geolocation runs only once, inside loadUserData, if no saved altitude

  const loadUserData = async (userId) => {
    try {
      const { data:pd } = await sbClient.from("profiles").select("*").eq("id",userId).single();
      const savedAlt = pd?.altitude_m || 0;
      const savedAltSource = pd?.altitude_source || "standard";
      if (pd) {
        setProfile({
          sex: pd.sex||"male", birthDate: pd.birth_date||"",
          height: pd.height||"", weight: pd.weight||"",
          bloodType: pd.blood_type||"", city: pd.city||"",
          exerciseHours: pd.exercise_hours||0, dietType: pd.diet_type||"balanced",
          altitudeM: savedAlt, altitudeSource: savedAltSource,
          resolvedCity: pd.city||""
        });
        setCityInput(pd.city||"");
      }
      // Only request geolocation if user has no saved altitude yet
      if (!savedAlt && navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async pos => {
          const alt = await getAltitudeFromCoords(pos.coords.latitude, pos.coords.longitude);
          setProfile(p => ({ ...p, altitudeM: Math.round(alt), altitudeSource:"gps" }));
        }, () => {});
      }
      const { data:sd } = await sbClient.from("lab_sessions").select("*").eq("user_id",userId).order("date",{ascending:true});
      if (sd?.length) setSessions(sd.map(s=>({ id:s.id, date:s.date, label:s.label, values:s.values })));
    } catch(e) { console.error(e); }
    finally { setAuthLoading(false); }
  };

  // Sync profile
  useEffect(() => {
    if (!user) return;
    const t = setTimeout(async () => {
      try {
        await sbClient.from("profiles").upsert({
          id: user.id, sex: profile.sex, birth_date: profile.birthDate||null,
          height: profile.height||null, weight: profile.weight||null,
          blood_type: profile.bloodType||null, city: profile.city||null,
          exercise_hours: profile.exerciseHours||0, diet_type: profile.dietType||"balanced",
          altitude_m: profile.altitudeM||0, altitude_source: profile.altitudeSource||"standard"
        });
      } catch(e) { console.error(e); }
    }, 1000);
    return () => clearTimeout(t);
  }, [profile, user]);

  const handleCitySearch = async () => {
    if (!cityInput.trim()) return;
    setAltitudeLoading(true);
    const result = await getAltitudeFromCity(cityInput.trim());
    setAltitudeLoading(false);
    if (result) {
      setProfile(p => ({ ...p, city: cityInput.trim(), resolvedCity: result.cityName, altitudeM: result.altitude, altitudeSource:"city" }));
    } else {
      setProfile(p => ({ ...p, city: cityInput.trim() }));
    }
  };

  // Import handlers
  const handleFileChosen = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";
    const isImage = file.type.startsWith("image/");
    const isPDF = file.type==="application/pdf" || file.name.toLowerCase().endsWith(".pdf");
    if (!isImage && !isPDF) { setImportState({ open:true, status:"error", progress:"", detected:[], imageUrl:null, error:"Unsupported file type." }); return; }
    const imageUrl = isImage ? URL.createObjectURL(file) : null;
    setImportState({ open:true, status:"loading", progress:"Preparing…", detected:[], imageUrl, error:null });
    try {
      let text = "";
      if (isPDF) text = await extractPDFText(file, p => setImportState(s=>({...s,progress:p})));
      else throw new Error("Automatic image recognition not available. Refer to the image while entering values manually.");
      const parsed = parseLabText(text);
      const detected = LAB_PATTERNS.map(p=>({ id:p.id, name:p.name, unit:p.unit, value:parsed[p.id]??null, checked:!!parsed[p.id] }));
      setImportState(s=>({...s, status:"done", detected, progress:""}));
    } catch(err) {
      if (isImage && imageUrl) setImportState(s=>({...s, status:"image_only", error:err.message}));
      else setImportState(s=>({...s, status:"error", error:err.message}));
    }
  };

  const handleToggle = (id, checked) => {
    setImportState(s=>({ ...s, detected:id==="all" ? s.detected.map(d=>({...d,checked:d.value!==null?checked:false})) : s.detected.map(d=>d.id===id?{...d,checked}:d) }));
  };

  const applyImport = () => {
    const toApply = importState.detected.filter(d=>d.checked&&d.value!==null);
    setCurrentValues(prev=>{ const next={...prev}; toApply.forEach(d=>{next[d.id]=d.value;}); return next; });
    setImportState(s=>({...s,open:false}));
    setShowTestForm(true); setMainTab("tests");
  };

  const saveTest = async () => {
    if (!Object.values(currentValues).some(v=>v!=="")) return;
    setCloudSyncing(true);
    try {
      if (user) {
        const { data, error } = await sbClient.from("lab_sessions").insert({ user_id:user.id, label:currentLabel.trim()||fmtDate(currentDate), date:currentDate, values:currentValues }).select().single();
        if (error) throw error;
        setSessions(prev=>[...prev,{id:data.id,date:data.date,label:data.label,values:data.values}].sort((a,b)=>a.date.localeCompare(b.date)));
      }
      setSaveMsg("Saved"); setCurrentLabel("");
      setTimeout(()=>setSaveMsg(""),2500);
      setShowTestForm(false);
    } catch(e) { console.error(e); setSaveMsg("Save failed"); setTimeout(()=>setSaveMsg(""),3000); }
    finally { setCloudSyncing(false); }
  };

  const deleteSession = async (id) => {
    setSessions(prev=>prev.filter(x=>x.id!==id));
    if (user) { try { await sbClient.from("lab_sessions").delete().eq("id",id).eq("user_id",user.id); } catch(e){} }
  };

  if (authLoading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:C.bg }}>
      <div style={{ width:36, height:36, borderRadius:"50%", border:`3px solid #1a1a1a`, borderTopColor:C.teal, animation:"spin 1s linear infinite" }} />
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
  if (!user) return <LoginScreen />;

  const initials = (user.email||"U")[0].toUpperCase();

  // ── DASHBOARD ────────────────────────────────────────────────────────────────
  const DashboardTab = () => {
    const lastSession = sessions.length > 0 ? sessions[sessions.length-1] : null;
    const dashAnalyses = lastSession ? computeAnalyses(markers, lastSession.values) : analyses;
    const dashScore    = lastSession ? computeScore(dashAnalyses) : score;
    const dashNeeds    = dashAnalyses.filter(a=>!["optimal","normal"].includes(a.result.status)).sort((a,b)=>PRIORITY.indexOf(a.result.status)-PRIORITY.indexOf(b.result.status));
    const dashGood     = dashAnalyses.filter(a=>["optimal","normal"].includes(a.result.status));

    if (dashAnalyses.length === 0) return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"60px 24px", textAlign:"center" }}>
        <div style={{ width:64, height:64, borderRadius:20, background:C.teal+"12", border:`1px solid ${C.teal}20`, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:20, fontSize:28 }}>◎</div>
        <div style={{ fontSize:18, fontWeight:500, marginBottom:8 }}>No tests yet</div>
        <div style={{ fontSize:14, color:"#444", marginBottom:28, lineHeight:1.6 }}>Import your first lab report to see your health dashboard</div>
        <button onClick={()=>{ setShowTestForm(true); setMainTab("tests"); }}
          style={{ padding:"12px 28px", borderRadius:12, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:14, fontWeight:500 }}>
          Add first test
        </button>
      </div>
    );

    return (
      <div style={{ paddingBottom:100 }}>
        {lastSession && <div style={{ fontSize:11, color:"#333", marginBottom:10 }}>Last test: {fmtDate(lastSession.date)}</div>}

        <ScoreCard
          score={dashScore}
          total={dashAnalyses.length}
          attention={dashNeeds.length}
          optimal={dashGood.length}
        />

        {dashAnalyses.length > 0 && (
          <>
            <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8, marginTop:16 }}>Key markers</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
              {dashAnalyses.slice(0,6).map(a => {
                const col = statusColor(a.result.status);
                const range = a.normalRange || a.optimalRange || [0,100];
                const pct = range[1] < 900 ? Math.min(((a.val-range[0])/(range[1]-range[0]))*100,100) : Math.min((a.val/200)*100,100);
                const bgGrad = a.result.status === "optimal" || a.result.status === "normal"
                  ? "linear-gradient(135deg,#0a2020 0%,#080f0f 60%,#080808 100%)"
                  : a.result.status === "critical_high" || a.result.status === "critical_low" || a.result.status === "deficient"
                  ? "linear-gradient(135deg,#200808 0%,#120404 60%,#080808 100%)"
                  : "linear-gradient(135deg,#1e0e00 0%,#100800 60%,#080808 100%)";
                return (
                  <div key={a.id} onClick={()=>setSelectedMarker(a)} style={{ borderRadius:16, border:`1px solid ${col}25`, padding:"14px 14px", background:bgGrad, cursor:"pointer" }}>
                    <div style={{ fontSize:10, color:"#888", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>{a.name}</div>
                    <div style={{ fontSize:26, fontWeight:400, lineHeight:1 }}>{a.val} <span style={{ fontSize:10, color:"#555" }}>{a.unit}</span></div>
                    <Badge status={a.result.status} />
                    <div style={{ height:3, background:"#1a1a1a", borderRadius:2, marginTop:10, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${Math.max(pct,5)}%`, background:col, borderRadius:2 }} />
                    </div>
                    <div style={{ fontSize:10, color:"#333", marginTop:8, textAlign:"right" }}>tap for details →</div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {dashNeeds.length > 0 && (
          <>
            <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>Action items</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {dashNeeds.slice(0,5).map(a => {
                const col = statusColor(a.result.status);
                return (
                  <div key={a.id} onClick={()=>setSelectedMarker(a)} style={{ background:C.card, borderRadius:14, border:`1px solid ${C.border}`, padding:"12px 14px", display:"flex", alignItems:"flex-start", gap:12, cursor:"pointer" }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:col, flexShrink:0, marginTop:3 }} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:500, color:"#e0e0e0" }}>{a.name}</div>
                      {a.advice.slice(0,2).map((tip,i) => (
                        <div key={i} style={{ fontSize:11, color:"#666", marginTop:2, lineHeight:1.5 }}>{tip}</div>
                      ))}
                    </div>
                    <Badge status={a.result.status} />
                  </div>
                );
              })}
            </div>
          </>
        )}

        {dashGood.length > 0 && (
          <>
            <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8, marginTop:16 }}>Looking good</div>
            <div style={{ background:C.card, borderRadius:14, border:`1px solid ${C.border}`, padding:"12px 14px" }}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {dashGood.map(a => (
                  <span key={a.id} style={{ fontSize:11, padding:"4px 10px", borderRadius:20, background:C.teal+"12", color:C.teal }}>{a.name}</span>
                ))}
              </div>
            </div>
          </>
        )}

        {profile.altitudeM > 0 && (
          <div style={{ marginTop:12, padding:"8px 12px", borderRadius:10, background:"#12BFBF08", border:`1px solid ${C.teal}15`, fontSize:11, color:"#555" }}>
            Ranges personalized for {profile.resolvedCity || profile.city || "your location"} at {profile.altitudeM}m altitude
          </div>
        )}
      </div>
    );
  };

  // ── TRENDS ───────────────────────────────────────────────────────────────────
  const TrendsTab = () => (
    <div style={{ paddingBottom:100 }}>
      {sessions.length === 0 ? (
        <div style={{ textAlign:"center", padding:"60px 24px", color:"#333" }}>
          <div style={{ fontSize:16, fontWeight:500, color:"#fff", marginBottom:8 }}>No data yet</div>
          <div style={{ fontSize:13 }}>Save tests to track trends over time</div>
        </div>
      ) : (
        <>
          <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"14px 16px", marginBottom:10 }}>
            <select value={trendMarkerId} onChange={e=>setTrendMarkerId(e.target.value)}
              style={{ width:"100%", background:"transparent", border:"none", color:"#fff", fontSize:14, cursor:"pointer" }}>
              {CATEGORIES.map(cat => (
                <optgroup key={cat.id} label={cat.label}>
                  {markers.filter(m=>m.category===cat.id).map(m => (
                    <option key={m.id} value={m.id} style={{ background:"#1a1a1a" }}>{m.name} ({m.unit})</option>
                  ))}
                </optgroup>
              ))}
            </select>
          </div>
          {trendMarker && (
            <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"16px", marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <div style={{ fontSize:15, fontWeight:500 }}>{trendMarker.name}</div>
                <div style={{ fontSize:11, color:"#444" }}>{trendMarker.unit}</div>
              </div>
              <TrendChart marker={trendMarker} sessions={sessions} />
            </div>
          )}
          {allMarkersWithData.length > 1 && (
            <>
              <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8, marginTop:16 }}>All tracked markers</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {allMarkersWithData.filter(m=>m.id!==trendMarkerId).map(m => (
                  <button key={m.id} onClick={()=>setTrendMarkerId(m.id)}
                    style={{ background:C.card, borderRadius:14, border:`1px solid ${C.border}`, padding:"12px", textAlign:"left", cursor:"pointer" }}>
                    <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>{m.name}</div>
                    <TrendChart marker={m} sessions={sessions} />
                  </button>
                ))}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );

  // ── TESTS ────────────────────────────────────────────────────────────────────
  const TestsTab = () => (
    <div style={{ paddingBottom:100 }}>
      {!showTestForm ? (
        <>
          <button onClick={()=>setShowTestForm(true)} style={{ width:"100%", padding:"13px 0", borderRadius:14, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:14, fontWeight:500, marginBottom:16 }}>
            + New test
          </button>
          {sessions.length === 0 ? (
            <div style={{ textAlign:"center", padding:"40px 0", color:"#555", fontSize:14 }}>No tests saved yet</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {[...sessions].reverse().map(s => {
                const sA = computeAnalyses(markers, s.values);
                const sS = computeScore(sA);
                const sc = scoreColor(sS);
                return (
                  <div key={s.id} style={{ background:C.card, borderRadius:14, border:`1px solid ${C.border}`, padding:"14px 16px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <div>
                        <div style={{ fontSize:14, fontWeight:500 }}>{s.label}</div>
                        <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{fmtDate(s.date)}</div>
                      </div>
                      {sS && <div style={{ fontSize:22, fontWeight:400, color:sc }}>{sS}</div>}
                    </div>
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={()=>{ setCurrentValues({...s.values}); setCurrentDate(s.date); setShowTestForm(true); }}
                        style={{ flex:1, padding:"8px 0", borderRadius:8, background:"transparent", border:`1px solid ${C.teal}40`, color:C.teal, cursor:"pointer", fontSize:12 }}>Load</button>
                      <button onClick={()=>deleteSession(s.id)}
                        style={{ padding:"8px 14px", borderRadius:8, background:"transparent", border:`1px solid ${C.border}`, color:"#555", cursor:"pointer", fontSize:12 }}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      ) : (
        <>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
            <button onClick={()=>setShowTestForm(false)} style={{ background:"transparent", border:"none", color:"#666", cursor:"pointer", fontSize:16, padding:0 }}>←</button>
            <div style={{ fontSize:16, fontWeight:500 }}>New test</div>
          </div>

          <div style={{ display:"flex", overflowX:"auto", gap:6, marginBottom:14, paddingBottom:4 }}>
            {CATEGORIES.map(cat => {
              const catHasIssue = markers.filter(m=>m.category===cat.id).some(m=>{ const raw=currentValues[m.id]; if(!raw) return false; const v=parseFloat(raw); if(isNaN(v)) return false; return !["optimal","normal"].includes(m.evaluate(v).status); });
              const catHasAny = markers.filter(m=>m.category===cat.id).some(m=>currentValues[m.id]);
              return (
                <button key={cat.id} onClick={()=>setActiveCategory(cat.id)} style={{ padding:"6px 14px", borderRadius:20, border:`1px solid ${activeCategory===cat.id?C.teal:C.border}`, background:activeCategory===cat.id?C.teal+"15":"transparent", color:activeCategory===cat.id?C.teal:"#666", cursor:"pointer", fontSize:12, whiteSpace:"nowrap", position:"relative" }}>
                  {cat.label}
                  {catHasAny && <span style={{ position:"absolute", top:-2, right:-2, width:6, height:6, borderRadius:"50%", background:catHasIssue?C.orange:C.teal, border:`1px solid ${C.bg}` }} />}
                </button>
              );
            })}
          </div>

          {!Object.values(currentValues).some(v=>v) && (
            <div style={{ borderRadius:14, border:`1px dashed ${C.teal}30`, background:C.teal+"06", padding:16, marginBottom:14, textAlign:"center" }}>
              <div style={{ fontSize:13, color:"#555", marginBottom:10 }}>Import from PDF or paste lab text</div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setImportState({open:true,status:"paste",progress:"",detected:[],imageUrl:null,error:null})}
                  style={{ flex:1, padding:"9px 0", borderRadius:10, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:13, fontWeight:500 }}>
                  Paste text
                </button>
                <label htmlFor="lab-file-input" style={{ flex:1, padding:"9px 0", borderRadius:10, background:"transparent", border:`1px solid ${C.teal}40`, color:C.teal, cursor:"pointer", fontSize:13, textAlign:"center", display:"block" }}>
                  Upload PDF
                </label>
              </div>
            </div>
          )}

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
            {currentMarkers.map(m => {
              const raw = currentValues[m.id];
              const hasVal = raw !== undefined && raw !== "";
              const val = hasVal ? parseFloat(raw) : null;
              const result = (hasVal && !isNaN(val)) ? m.evaluate(val) : null;
              const col = result ? statusColor(result.status) : C.border;
              return (
                <div key={m.id} style={{ background:C.card, borderRadius:14, border:`1px solid ${result?col+"40":C.border}`, padding:"12px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ fontSize:11, color:"#888" }}>{m.name}</div>
                    {result && <Badge status={result.status} />}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <input type="number" value={raw||""} onChange={e=>setCurrentValues(p=>({...p,[m.id]:e.target.value}))}
                      placeholder={m.placeholder} step="any"
                      style={{ flex:1, background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 10px", color:"#fff", fontSize:14, minWidth:0 }} />
                    <span style={{ fontSize:10, color:"#444", whiteSpace:"nowrap" }}>{m.unit}</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ background:C.card, borderRadius:14, border:`1px solid ${C.border}`, padding:"12px 14px" }}>
            <div style={{ display:"flex", gap:8, marginBottom:8, flexWrap:"wrap" }}>
              <input type="date" value={currentDate} onChange={e=>setCurrentDate(e.target.value)}
                style={{ background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"7px 10px", color:"#fff", fontSize:13 }} />
              <input type="text" value={currentLabel} onChange={e=>setCurrentLabel(e.target.value)} placeholder="Label (optional)"
                style={{ flex:1, background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"7px 10px", color:"#fff", fontSize:13, minWidth:80 }} />
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {saveMsg && <span style={{ fontSize:12, color:saveMsg.includes("fail")?C.red:C.teal }}>{saveMsg}</span>}
              {cloudSyncing && <span style={{ fontSize:12, color:"#555" }}>Syncing…</span>}
              <button onClick={()=>setCurrentValues({})} style={{ padding:"9px 14px", borderRadius:10, background:"transparent", border:`1px solid ${C.border}`, color:"#555", cursor:"pointer", fontSize:13 }}>Clear</button>
              <button onClick={saveTest} style={{ flex:1, padding:"9px 0", borderRadius:10, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:13, fontWeight:500 }}>Save test</button>
            </div>
          </div>
        </>
      )}
    </div>
  );

  // ── PROFILE ──────────────────────────────────────────────────────────────────
  const ProfileTab = () => (
    <div style={{ paddingBottom:100 }}>
      <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:24, padding:"16px", background:C.card, borderRadius:16, border:`1px solid ${C.border}` }}>
        <div style={{ width:48, height:48, borderRadius:"50%", background:C.teal+"18", border:`1px solid ${C.teal}30`, display:"flex", alignItems:"center", justifyContent:"center", color:C.teal, fontSize:18, fontWeight:500 }}>
          {initials}
        </div>
        <div>
          <div style={{ fontSize:15, fontWeight:500 }}>{user.email}</div>
          <div style={{ fontSize:12, color:"#555", marginTop:2 }}>{sessions.length} tests saved</div>
        </div>
      </div>

      {/* Biological profile */}
      <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>Biological profile</div>
      <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"16px", marginBottom:16 }}>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>Biological sex</div>
          <div style={{ display:"flex", gap:6 }}>
            {[["male","Male"],["female","Female"],["other","Other"]].map(([val,lbl]) => (
              <button key={val} onClick={()=>setProfile(p=>({...p,sex:val}))}
                style={{ flex:1, padding:"8px 0", borderRadius:10, border:`1px solid ${profile.sex===val?C.teal:C.border}`, background:profile.sex===val?C.teal+"15":"transparent", color:profile.sex===val?C.teal:"#666", cursor:"pointer", fontSize:13 }}>
                {lbl}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
            Date of birth {profile.birthDate && <span style={{ color:C.teal }}>— age {age}</span>}
          </div>
          <DateOfBirthPicker value={profile.birthDate||""} onChange={v=>setProfile(p=>({...p,birthDate:v}))} />
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <ProfileField label="Height (cm)" value={profile.height||""} onChange={v=>setProfile(p=>({...p,height:v}))} type="number" placeholder="e.g. 175" />
          <ProfileField label="Weight (kg)" value={profile.weight||""} onChange={v=>setProfile(p=>({...p,weight:v}))} type="number" placeholder="e.g. 70" />
        </div>
      </div>

      {/* Lifestyle */}
      <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>Lifestyle</div>
      <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"16px", marginBottom:16 }}>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
            Exercise hours per week
            {profile.exerciseHours >= 8 && <span style={{ color:C.teal, fontSize:11 }}> · Athlete profile active</span>}
          </div>
          <select value={profile.exerciseHours} onChange={e=>setProfile(p=>({...p,exerciseHours:Number(e.target.value)}))}
            style={{ width:"100%", background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 10px", color:"#fff", fontSize:14 }}>
            <option value={0}>0 hours — Sedentary</option>
            {[1,2,3,4,5,6,7].map(h => <option key={h} value={h}>{h} hour{h>1?"s":""} per week</option>)}
            <option value={8}>8 hours per week</option>
            {[9,10,11,12,13,14].map(h => <option key={h} value={h}>{h} hours per week</option>)}
            <option value={15}>More than 14 hours per week</option>
          </select>
        </div>

        <div>
          <div style={{ fontSize:12, color:"#888", marginBottom:10 }}>Diet type</div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {DIET_OPTIONS.map(opt => (
              <button key={opt.id} onClick={()=>setProfile(p=>({...p,dietType:opt.id}))}
                style={{ padding:"10px 14px", borderRadius:10, border:`1px solid ${profile.dietType===opt.id?C.teal:C.border}`, background:profile.dietType===opt.id?C.teal+"15":"transparent", color:profile.dietType===opt.id?C.teal:"#888", cursor:"pointer", fontSize:13, textAlign:"left" }}>
                {opt.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Health details */}
      <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>Health details</div>
      <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"16px", marginBottom:16 }}>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>Blood type</div>
          <select value={profile.bloodType||""} onChange={e=>setProfile(p=>({...p,bloodType:e.target.value}))}
            style={{ width:"100%", background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 10px", color:profile.bloodType?"#fff":"#444", fontSize:14 }}>
            <option value="">Select blood type</option>
            {["A+","A-","B+","B-","AB+","AB-","O+","O-"].map(bt => <option key={bt} value={bt} style={{ background:"#1a1a1a" }}>{bt}</option>)}
          </select>
        </div>

        {/* Altitude / city */}
        <div>
          <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
            Location & altitude
            {profile.altitudeSource === "gps" && <span style={{ color:C.teal, fontSize:11 }}> · Detected via GPS</span>}
            {profile.altitudeSource === "city" && <span style={{ color:C.teal, fontSize:11 }}> · {profile.resolvedCity}</span>}
          </div>
          {profile.altitudeM > 0 && (
            <div style={{ fontSize:13, color:C.teal, marginBottom:10, padding:"6px 12px", background:C.teal+"10", borderRadius:8 }}>
              {profile.altitudeM}m above sea level
              {profile.altitudeM >= 2000 && " · High altitude adjustments active"}
            </div>
          )}
          <div style={{ display:"flex", gap:8 }}>
            <input type="text" value={cityInput} onChange={e=>setCityInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleCitySearch()}
              placeholder="e.g. Bogotá, Medellín, Mexico City"
              style={{ flex:1, background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 10px", color:"#fff", fontSize:13 }} />
            <button onClick={handleCitySearch} disabled={altitudeLoading}
              style={{ padding:"8px 14px", borderRadius:8, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:13, opacity:altitudeLoading?0.5:1 }}>
              {altitudeLoading ? "…" : "Search"}
            </button>
          </div>
        </div>
      </div>

      {/* Personalization info */}
      <div style={{ background:C.card, borderRadius:16, border:`1px solid ${C.border}`, padding:"14px 16px", marginBottom:16 }}>
        <div style={{ fontSize:12, color:"#666", marginBottom:10 }}>Active personalizations</div>
        <div style={{ display:"flex", flexDirection:"column", gap:6, fontSize:12, color:"#555" }}>
          <div style={{ display:"flex", gap:8 }}><span style={{ color:C.teal }}>♀/♂</span><span>Reference ranges adjust for your biological sex</span></div>
          <div style={{ display:"flex", gap:8 }}><span style={{ color:C.teal }}>Age</span><span>TSH, Vitamin D & eGFR thresholds adjust after 60</span></div>
          {profile.exerciseHours >= 8 && <div style={{ display:"flex", gap:8 }}><span style={{ color:C.teal }}>🏃</span><span>Athlete recommendations active ({profile.exerciseHours}h/week)</span></div>}
          {profile.altitudeM >= 2000 && <div style={{ display:"flex", gap:8 }}><span style={{ color:C.teal }}>⛰</span><span>High altitude adjustments active ({profile.altitudeM}m) — hemoglobin, ferritin, hematocrit</span></div>}
          {profile.dietType !== "balanced" && <div style={{ display:"flex", gap:8 }}><span style={{ color:C.teal }}>🥗</span><span>Diet-specific tips active ({DIET_OPTIONS.find(d=>d.id===profile.dietType)?.label})</span></div>}
        </div>
      </div>

      <button onClick={()=>sbClient.auth.signOut()} style={{ width:"100%", padding:"12px 0", borderRadius:12, background:"transparent", border:`1px solid ${C.border}`, color:"#555", cursor:"pointer", fontSize:14 }}>
        Sign out
      </button>
    </div>
  );

  // ── NAV ──────────────────────────────────────────────────────────────────────
  const NAV = [
    { id:"dashboard", label:"Dashboard", icon:<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="2" fill="currentColor"/><rect x="10" y="2" width="6" height="6" rx="2" fill="currentColor"/><rect x="2" y="10" width="6" height="6" rx="2" fill="currentColor"/><rect x="10" y="10" width="6" height="6" rx="2" fill="currentColor"/></svg> },
    { id:"trends",    label:"Trends",    icon:<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 13 L5.5 8.5 L9 11 L12.5 6 L16 8.5" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg> },
    { id:"tests",     label:"Tests",     icon:<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" strokeWidth="1.5"/><line x1="6" y1="7" x2="12" y2="7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><line x1="6" y1="10" x2="12" y2="10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg> },
    { id:"profile",   label:"Profile",   icon:<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="7" r="3" stroke="currentColor" strokeWidth="1.5"/><path d="M3 16c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg> },
  ];

  return (
    <div style={{ maxWidth:480, margin:"0 auto", background:C.bg, minHeight:"100vh", position:"relative" }}>
      <input ref={fileInputRef} type="file" accept=".pdf,image/*" id="lab-file-input"
        style={{ position:"absolute", width:1, height:1, opacity:0 }} onChange={handleFileChosen} />

      {selectedMarker && (
        <MarkerDetailScreen
          analysis={selectedMarker}
          profile={fullProfile}
          onClose={()=>setSelectedMarker(null)}
        />
      )}
      {importState.open && (
        <ImportModal
          state={importState}
          onToggle={handleToggle}
          onApply={applyImport}
          onAnalyzeText={detected => setImportState(s=>({...s, status:"done", detected}))}
          onClose={()=>setImportState(s=>({...s,open:false}))}
        />
      )}

      {/* Header */}
      <div style={{ padding:"52px 20px 16px", display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <div style={{ fontSize:12, color:"#444" }}>Good day</div>
          <div style={{ fontSize:22, fontWeight:500, letterSpacing:"-0.3px", marginTop:2 }}>{mainTab.charAt(0).toUpperCase()+mainTab.slice(1)}</div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {mainTab === "tests" && !showTestForm && (
            <button onClick={()=>setImportState({open:true,status:"paste",progress:"",detected:[],imageUrl:null,error:null})}
              style={{ padding:"7px 12px", borderRadius:10, background:C.teal+"15", border:`1px solid ${C.teal}30`, color:C.teal, cursor:"pointer", fontSize:12 }}>
              Import
            </button>
          )}
          <div style={{ width:34, height:34, borderRadius:"50%", background:C.teal+"18", border:`1px solid ${C.teal}30`, display:"flex", alignItems:"center", justifyContent:"center", color:C.teal, fontSize:13, fontWeight:500 }}>
            {initials}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ padding:"0 20px" }}>
        {mainTab==="dashboard" && <DashboardTab />}
        {mainTab==="trends"    && <TrendsTab />}
        {mainTab==="tests"     && <TestsTab />}
        {mainTab==="profile"   && <ProfileTab />}
      </div>

      {/* Bottom nav */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"#0c0c0c", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"space-around", padding:"10px 0 24px", zIndex:30 }}>
        {NAV.map(n => {
          const active = mainTab===n.id;
          return (
            <button key={n.id} onClick={()=>{ setMainTab(n.id); if(n.id!=="tests") setShowTestForm(false); }}
              style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, background:"none", border:"none", cursor:"pointer", color:active?C.teal:"#333", padding:"0 16px" }}>
              {n.icon}
              <span style={{ fontSize:10 }}>{n.label}</span>
              {active && <div style={{ width:16, height:2, background:C.teal, borderRadius:1 }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Innermark />);
  </script>
</body>
</html>
