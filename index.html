// ─── ALTITUDE HELPERS ─────────────────────────────────────────────────────────
async function getAltitudeFromCoords(lat, lng) {
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`);
    const data = await res.json();
    return data.elevation?.[0] ?? 0;
  } catch { return 0; }
}

async function getAltitudeFromCity(city) {
  try {
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const gd = await geo.json();
    if (!gd.results?.length) return null;
    const { latitude, longitude, name, country } = gd.results[0];
    const alt = await getAltitudeFromCoords(latitude, longitude);
    return { altitude: Math.round(alt), cityName: `${name}, ${country}` };
  } catch { return null; }
}

function parseLabText(rawText) {
  const results = {};
  const text = rawText.replace(/[ \t]+/g, " ").toLowerCase()
    .replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i").replace(/ó/g,"o").replace(/ú/g,"u")
    .replace(/ñ/g,"n");
  for (const { id, kws, range } of LAB_PATTERNS) {
    let found = false;
    for (const kw of kws) {
      const kwNorm = kw.toLowerCase()
        .replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i").replace(/ó/g,"o").replace(/ú/g,"u")
        .replace(/ñ/g,"n");
      const idx = text.indexOf(kwNorm);
      if (idx === -1) continue;
      const snippet = text.slice(idx + kwNorm.length, idx + kwNorm.length + 120);
      const numRe = /(\d+\.\d+|\d+)\s*(?:[hl]{1,2}\b)?/gi;
      let m;
      while ((m = numRe.exec(snippet)) !== null) {
        const val = parseFloat(m[1]);
        if (!isNaN(val) && val >= range[0] && val <= range[1]) {
          if (val > 1900 && val < 2100) continue;
          results[id] = String(val); found = true; break;
        }
      }
      if (found) break;
    }
  }
  return results;
}

async function extractPDFText(file, onProgress) {
  onProgress?.("Reading PDF…");
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ({ target: { result } }) => {
      if (/\/Encrypt[\s/]/.test(result)) { reject(new Error("PDF is password-protected. Print to PDF first.")); return; }
      let text = "";
      const btRe = /BT\b([\s\S]*?)\bET\b/g;
      let block;
      while ((block = btRe.exec(result)) !== null) {
        const content = block[1];
        const litRe = /\(((?:[^\\)]|\\[\s\S])*)\)/g;
        let m;
        while ((m = litRe.exec(content)) !== null) {
          const s = m[1].replace(/\\n/g,"\n").replace(/\\r/g," ").replace(/\\t/g," ").replace(/\\\d{3}/g," ").replace(/\\(.)/g,"$1");
          if (s.trim()) text += s + " ";
        }
        const hexRe = /<([0-9a-fA-F\s]{2,})>/g;
        let h;
        while ((h = hexRe.exec(content)) !== null) {
          const hx = h[1].replace(/\s/g,"");
          let decoded = "";
          for (let i = 0; i+1 < hx.length; i += 2) {
            const cp = parseInt(hx.substr(i,2),16);
            if (cp >= 32 && cp < 127) decoded += String.fromCharCode(cp);
          }
          if (decoded.trim()) text += decoded + " ";
        }
        text += "\n";
      }
      resolve(text.trim());
    };
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsText(file, "latin1");
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function computeAnalyses(markers, values) {
  return markers.map(m => {
    const raw = values[m.id];
    if (!raw && raw !== 0) return null;
    const val = parseFloat(raw);
    if (isNaN(val)) return null;
    const result = m.evaluate(val);
    return { ...m, val, result, advice: m.advice[result.status] || [] };
  }).filter(Boolean);
}

function computeScore(analyses) {
  if (!analyses.length) return null;
  const W = { optimal:100, normal:80, borderline:55, insufficient:50, elevated:40, deficient:20, critical_low:25, critical_high:15 };
  return Math.round(analyses.reduce((s,a) => s + (W[a.result.status] ?? 50), 0) / analyses.length);
}

function fmtDate(d) {
  if (!d) return "";
  const [y,m,day] = d.split("-");
  return `${m}/${day}/${y}`;
}

function calcAge(birthDate) {
  if (!birthDate) return 35;
  const today = new Date();
  const bd = new Date(birthDate);
  let age = today.getFullYear() - bd.getFullYear();
  const m = today.getMonth() - bd.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < bd.getDate())) age--;
  return Math.max(1, Math.min(120, age));
}

function scoreColor(s) {
  if (!s) return C.teal;
  if (s >= 70) return C.teal;
  if (s >= 55) return C.orange;
  return C.red;
}
function scoreLabel(s) {
  if (!s) return "";
  if (s >= 85) return "Excellent";
  if (s >= 70) return "Good";
  if (s >= 55) return "Needs attention";
  return "Requires action";
}

// ─── HALFTONE CANVAS ──────────────────────────────────────────────────────────
function drawHalftone(canvas, optimalPct) {
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const PIXEL = 2, GAP = 1, STEP = PIXEL + GAP;

  function seededRand(seed) {
    const x = Math.sin(seed) * 43758.5453123;
    return x - Math.floor(x);
  }

  function lerpColor(t) {
    const smooth = x => x * x * (3 - 2 * x);
    let r, g, b;
    if (t <= 0.5) {
      const s = smooth(t / 0.5);
      r = Math.round(18  + s * (6  - 18));
      g = Math.round(191 + s * (6  - 191));
      b = Math.round(191 + s * (6  - 191));
    } else {
      const s = smooth((t - 0.5) / 0.5);
      r = Math.round(6  + s * (245 - 6));
      g = Math.round(6  + s * (131 - 6));
      b = Math.round(6  + s * (0   - 6));
    }
    return [r, g, b];
  }

  function density(tx, ty) {
    const hd = Math.pow(2 * Math.abs(tx - 0.5), 1.6);
    const vwave = Math.sin(ty * Math.PI * 3.5) * 0.4 + Math.sin(ty * Math.PI * 7) * 0.2 + Math.sin(ty * Math.PI * 14) * 0.1;
    const raw = hd + vwave * (1 - hd) * 0.6;
    return Math.min(Math.max(0.5 + raw * 0.5, 0), 1);
  }

  for (let row = 0; row * STEP <= H; row++) {
    for (let col = 0; col * STEP <= W; col++) {
      const x = col * STEP, y = row * STEP;
      const tx = x / W, ty = y / H;
      const colorT = Math.pow(tx, 0.85);
      const d = density(tx, ty);
      const rand = seededRand(col * 1000 + row * 0.137 + col * row * 0.031);
      const noise = seededRand(col * 7.3 + row * 13.7);
      const threshold = rand * 0.7 + noise * 0.3;
      if (d > threshold) {
        const [r, g, b] = lerpColor(colorT);
        const alpha = (0.55 + d * 0.35) * 0.70;
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fillRect(x, y, PIXEL, PIXEL);
      }
    }
  }
}

function ScoreCard({ score, total, attention, optimal }) {
  const canvasRef = useRef(null);
  const sc = scoreColor(score);

  useEffect(() => {
    if (!canvasRef.current) return;
    const canvas = canvasRef.current;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = Math.round(rect.width  * devicePixelRatio);
    canvas.height = Math.round(rect.height * devicePixelRatio);
    canvas.style.width  = rect.width  + "px";
    canvas.style.height = rect.height + "px";
    const ctx = canvas.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);
    drawHalftone(canvas, optimal / (total || 1));
  }, [score, total, optimal]);

  return (
    <div style={{ position:"relative", borderRadius:20, border:`1px solid ${C.border}`, marginBottom:10, overflow:"hidden", background:"#060606" }}>
      <canvas ref={canvasRef} style={{ position:"absolute", inset:0, width:"100%", height:"100%", opacity:0.70 }} />
      <div style={{ position:"absolute", inset:0, background:"linear-gradient(to right,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.05) 50%,rgba(0,0,0,0.3) 100%)", pointerEvents:"none" }} />
      <div style={{ position:"relative", zIndex:2, padding:"22px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:11, color:"#888", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:4 }}>Health score</div>
          <div style={{ fontSize:80, fontWeight:300, lineHeight:1, letterSpacing:"-2px", color:sc }}>{score ?? "—"}</div>
          <div style={{ fontSize:13, color:sc, marginTop:6 }}>{scoreLabel(score)}</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:20, fontWeight:400, color:"#e8e8e8" }}>{total}</div>
            <div style={{ fontSize:10, color:"#888" }}>markers</div>

            <div style={{ fontSize:10, color:"#888" }}>optimal</div>

}

// ─── TREND CHART ──────────────────────────────────────────────────────────────
function TrendChart({ marker, sessions }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  const data = sessions
    .filter(s => s.values[marker.id] !== undefined && s.values[marker.id] !== "")
    .map(s => ({ date: fmtDate(s.date), value: parseFloat(s.values[marker.id]) }))
    .filter(d => !isNaN(d.value));

  useEffect(() => {
    if (!canvasRef.current || data.length < 2) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type:"line",
      data:{ labels:data.map(d=>d.date), datasets:[{ data:data.map(d=>d.value), borderColor:C.teal, backgroundColor:C.teal+"15", borderWidth:2, pointRadius:4, pointBackgroundColor:C.teal, tension:0.3, fill:true }] },
      options:{ responsive:true, plugins:{ legend:{display:false}, tooltip:{ backgroundColor:"#1a1a1a", titleColor:"#888", bodyColor:"#fff", callbacks:{ label:ctx=>ctx.parsed.y+" "+marker.unit } } }, scales:{ x:{ grid:{color:"#1a1a1a"}, ticks:{color:"#444",font:{size:10}} }, y:{ grid:{color:"#1a1a1a"}, ticks:{color:"#444",font:{size:10}} } } }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data.length, marker.id]);

  if (data.length < 2) return (
    <div style={{ height:140, display:"flex", alignItems:"center", justifyContent:"center", color:"#333", fontSize:13, background:"#0d0d0d", borderRadius:10 }}>
      {data.length === 0 ? "No data yet" : "Add 2+ tests to see trend"}
    </div>
  );
  return <canvas ref={canvasRef} height={140} />;
}

// ─── DATE OF BIRTH PICKER ────────────────────────────────────────────────────
function DateOfBirthPicker({ value, onChange }) {
  const parsed = value ? value.split("-") : ["","",""];
  const [year, setYear]   = useState(parsed[0]||"");
  const [month, setMonth] = useState(parsed[1]||"");
  const [day, setDay]     = useState(parsed[2]||"");

  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const currentYear = new Date().getFullYear();
  const years = Array.from({length:100}, (_,i) => currentYear - i);
  const daysInMonth = (m, y) => {
    if (!m || !y) return 31;
    return new Date(Number(y), Number(m), 0).getDate();
  };
  const maxDay = daysInMonth(month, year);
  const days = Array.from({length:maxDay}, (_,i) => i+1);

  useEffect(() => {
    if (year && month && day) {
      const d = Math.min(Number(day), daysInMonth(month, year));
      const padM = String(month).padStart(2,"0");
      const padD = String(d).padStart(2,"0");
      onChange(`${year}-${padM}-${padD}`);
    }
  }, [year, month, day]);

  const sel = { background:"#0a0a0a", border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 8px", color:"#fff", fontSize:13, cursor:"pointer" };

  return (
    <div style={{ display:"grid", gridTemplateColumns:"2fr 1.5fr 1fr", gap:6 }}>
      <select value={month} onChange={e=>setMonth(e.target.value)} style={sel}>
        <option value="">Month</option>
        {months.map((m,i) => <option key={i+1} value={String(i+1).padStart(2,"0")} style={{background:"#1a1a1a"}}>{m}</option>)}
      </select>
      <select value={day} onChange={e=>setDay(e.target.value)} style={sel}>
        <option value="">Day</option>
        {days.map(d => <option key={d} value={String(d).padStart(2,"0")} style={{background:"#1a1a1a"}}>{d}</option>)}
      </select>
      <select value={year} onChange={e=>setYear(e.target.value)} style={sel}>
        <option value="">Year</option>
        {years.map(y => <option key={y} value={y} style={{background:"#1a1a1a"}}>{y}</option>)}
      </select>
    </div>
  );
}

  hba1c: {
    what:"HbA1c (glycated hemoglobin) reflects your average blood glucose over the past 2–3 months. It measures the percentage of hemoglobin coated with glucose.",
    why:"Unlike a single glucose reading, HbA1c is not affected by a single meal or day's stress. It is the gold-standard diagnostic test for diabetes and the strongest long-term predictor of diabetic complications. Peter Attia emphasizes targeting HbA1c below 5.4% for longevity.",
    longTerm:{ borderline:"Pre-diabetic HbA1c is associated with a 3–10x higher risk of progressing to type 2 diabetes within 5 years. Lifestyle intervention at this stage is highly effective — Diabetes Prevention Program trial showed 58% risk reduction.", critical_high:"HbA1c above 6.5% signals established diabetes and predicts progressive organ damage if uncontrolled." },

  ldl: {

    longTerm:{ borderline:"Borderline LDL over decades contributes to atherosclerotic plaque buildup. The process is slow but cumulative — starting intervention early has disproportionate long-term benefit.", elevated:"Elevated LDL significantly accelerates atherosclerosis. Each 1 mmol/L reduction in LDL reduces cardiovascular event risk by ~20% (CTT Collaboration meta-analysis).", critical_high:"High LDL combined with other risk factors (hypertension, smoking, family history) dramatically increases 10-year cardiovascular event risk." },

  hdl: {
    what:"HDL (High-Density Lipoprotein) is called 'good' cholesterol. It transports cholesterol from arteries back to the liver for excretion. HDL also has anti-inflammatory and anti-oxidative properties.",

  tsh: {
    what:"TSH (Thyroid Stimulating Hormone) is produced by the pituitary gland. It signals the thyroid to produce T4, which converts to the active hormone T3. TSH is the primary screening test for thyroid function.",

  vit_d: {
    what:"Vitamin D (25-hydroxyvitamin D) is a fat-soluble hormone precursor produced by skin exposed to UVB sunlight, and obtained from food and supplements. It acts as a hormone affecting nearly every cell in the body.",
    why:"Vitamin D receptors are found in over 200 human genes. It regulates immune function, calcium metabolism, muscle function, mood (serotonin synthesis), and cardiovascular health. The Endocrine Society defines deficiency as below 20 ng/mL. Dr. Rhonda Patrick and the Grassroots Health initiative support targeting 60–80 ng/mL for optimal health.",
    longTerm:{ deficient:"Vitamin D deficiency is associated with increased risk of autoimmune disease, depression, cardiovascular disease, cancer (particularly colorectal), and bone loss (osteoporosis). Stanford Medicine links deficiency to 35% higher all-cause mortality.", insufficient:"Insufficient levels impair immune defense, increase inflammation, and reduce muscle recovery — particularly relevant for athletes.", optimal:"Optimal Vitamin D supports immune surveillance against cancer cells, reduces inflammatory cytokines, and is associated with longer telomere length in studies by researchers including Dr. Rhonda Patrick." },

  b12: {
    what:"Vitamin B12 (cobalamin) is an essential water-soluble vitamin found almost exclusively in animal products. It is critical for DNA synthesis, red blood cell formation, and the maintenance of the myelin sheath protecting nerve fibers.",

  ferritin: {
    what:"Ferritin is a protein that stores iron inside cells. Serum ferritin is the most sensitive test for total body iron stores — it reflects how much iron is banked for future use in hemoglobin synthesis and cellular processes.",
    why:"Iron is essential for oxygen transport, energy production (mitochondrial function), DNA synthesis, and immune function. Ferritin is considered the best single marker for iron status. Peter Attia targets ferritin of 100–150 ng/mL for optimal performance. Note: ferritin is also an acute-phase reactant — elevated ferritin can indicate inflammation even with adequate iron stores.",
    longTerm:{ deficient:"Iron depletion without anemia still causes fatigue, cognitive impairment, impaired exercise capacity, and hair loss. In athletes, it significantly reduces VO2max and performance. For pregnant women, low ferritin increases risk of preterm birth.", critical_low:"Severe iron deficiency progresses to iron-deficiency anemia — a major cause of fatigue, reduced immunity, and impaired cognitive function globally.", critical_high:"Chronically elevated ferritin (iron overload, hereditary hemochromatosis) causes liver cirrhosis, heart failure, diabetes, and joint disease." },

  alt: {

  ast: {

    source:"American Thyroid Association, Mayo Clinic, Cleveland Clinic Thyroid Guidelines"
  },
};

// ─── MAYO CLINIC REFERENCE RANGES TABLE ──────────────────────────────────────
const MAYO_RANGES = {
  glucose:      { range:"70–99 mg/dL", notes:"100–125 = prediabetes; ≥126 = diabetes (ADA / Mayo Clinic)", sex:null },
  hba1c:        { range:"< 5.7%", notes:"5.7–6.4% = prediabetes; ≥6.5% = diabetes (ADA / Mayo Clinic)", sex:null },
  insulin:      { range:"< 25 µIU/mL (fasted)", notes:"Optimal target < 5 µIU/mL per functional medicine guidelines (Peter Attia)", sex:null },
  total_chol:   { range:"< 200 mg/dL", notes:"200–239 = borderline high; ≥240 = high. <200 = desirable (NCEP / Mayo Clinic)", sex:null },
  ldl:          { rangeM:"< 100 mg/dL (healthy); < 70 if heart disease", rangeF:"< 100 mg/dL (healthy); < 70 if heart disease", notes:"Optimal for healthy adults without CAD (Mayo Clinic / AHA)", sex:"both" },
  hdl:          { rangeM:"> 40 mg/dL", rangeF:"> 50 mg/dL", notes:"Higher is protective. > 60 mg/dL considered cardioprotective (Mayo Clinic)", sex:"both" },
  triglycerides:{ range:"< 150 mg/dL", notes:"150–199 = borderline high; 200–499 = high; ≥500 = very high (NCEP / Mayo Clinic)", sex:null },
  tsh:          { range:"0.4–4.0 mIU/L", notes:"Many functional medicine physicians target 0.5–2.5 mIU/L for optimal thyroid health (American Thyroid Association)", sex:null },
  free_t3:      { range:"2.3–4.1 pg/mL", notes:"Mayo Clinic reference. Optimal functional range often cited as 3.0–4.0 pg/mL", sex:null },
  free_t4:      { range:"0.8–1.8 ng/dL", notes:"Mayo Clinic reference", sex:null },
  vit_d:        { range:"20–50 ng/mL", notes:"< 20 = deficiency; < 12 = severe deficiency. Many experts target 40–60 ng/mL (Endocrine Society / Mayo Clinic)", sex:null },
  b12:          { range:"200–900 pg/mL", notes:"Mayo Clinic reference. Functional optimum often cited as 500–900 pg/mL to reduce homocysteine", sex:null },
  ferritin:     { rangeM:"12–300 ng/mL", rangeF:"10–150 ng/mL", notes:"Mayo Clinic reference. Functional target often 50–150 ng/mL for optimal iron stores (Peter Attia)", sex:"both" },
  magnesium:    { range:"1.7–2.2 mg/dL", notes:"Mayo Clinic reference. Serum magnesium reflects only ~1% of total body magnesium", sex:null },
  hscrp:        { range:"< 1.0 mg/L (low risk)", notes:"1–3 mg/L = moderate cardiovascular risk; > 3 mg/L = high risk (AHA / Mayo Clinic / JUPITER Trial)", sex:null },
  homocysteine: { range:"< 15 µmol/L", notes:"Optimal target < 7–10 µmol/L. > 15 = hyperhomocysteinemia (Mayo Clinic)", sex:null },
  alt:          { rangeM:"7–56 U/L", rangeF:"7–56 U/L", notes:"Cleveland Clinic recommends flagging > 25 U/L (F) and > 33 U/L (M) as functionally elevated", sex:"both" },
  ast:          { range:"10–40 U/L", notes:"Mayo Clinic reference", sex:null },
  creatinine:   { rangeM:"0.7–1.2 mg/dL", rangeF:"0.5–1.1 mg/dL", notes:"Mayo Clinic reference. Varies with muscle mass — athletes may run higher", sex:"both" },
  egfr:         { range:"≥ 60 mL/min/1.73m²", notes:"≥ 90 = normal; 60–89 = mildly reduced; < 60 = CKD (National Kidney Foundation / Mayo Clinic)", sex:null },
  hemoglobin:   { rangeM:"13.5–17.5 g/dL", rangeF:"12.0–15.5 g/dL", notes:"Mayo Clinic reference. Altitude raises normal range by ~0.5–2 g/dL", sex:"both" },
  hematocrit:   { rangeM:"41–53%", rangeF:"36–46%", notes:"Mayo Clinic reference. Altitude increases expected values", sex:"both" },
};

function MayoRangeTable({ markerId, sex }) {
  const data = MAYO_RANGES[markerId];
  if (!data) return <p style={{ fontSize:12, color:"#555", margin:0 }}>See your lab report's reference range for this marker.</p>;

  const isFemale = sex === "female";
  const displayRange = data.sex === "both"
    ? (isFemale ? data.rangeF : data.rangeM)
    : data.range;
  const otherRange = data.sex === "both"
    ? (isFemale ? data.rangeM : data.rangeF)
    : null;
  const otherLabel = data.sex === "both"
    ? (isFemale ? "Male reference" : "Female reference")
    : null;

  return (
    <div>
      <div style={{ marginBottom:8 }}>
        <div style={{ fontSize:11, color:"#555", marginBottom:3 }}>{sex === "female" ? "Female" : sex === "male" ? "Male" : ""} reference range</div>
        <div style={{ fontSize:16, fontWeight:500, color:"#e0e0e0", fontFamily:"monospace" }}>{displayRange}</div>
      </div>
      {otherRange && (
        <div style={{ marginBottom:8, paddingTop:8, borderTop:`0.5px solid ${C.border}` }}>
          <div style={{ fontSize:11, color:"#444", marginBottom:3 }}>{otherLabel}</div>
          <div style={{ fontSize:13, color:"#666", fontFamily:"monospace" }}>{otherRange}</div>
        </div>
      )}
      {data.notes && (
        <div style={{ paddingTop:8, borderTop:`0.5px solid ${C.border}`, fontSize:12, color:"#555", lineHeight:1.6, fontStyle:"italic" }}>
          {data.notes}
        </div>
      )}
      <div style={{ marginTop:10, fontSize:10, color:"#333", lineHeight:1.5 }}>
        Source: Mayo Clinic Medical Laboratories, AHA, NCEP, NLA, ADA guidelines
      </div>
    </div>
  );
}

// ─── MARKER DETAIL SCREEN ─────────────────────────────────────────────────────
function MarkerDetailScreen({ analysis, profile, onClose }) {
  const [step, setStep]       = useState("info"); // "info" | "questions" | "result"
  const [answers, setAnswers] = useState({});
  const info = MARKER_INFO[analysis.id];
  const col  = statusColor(analysis.result.status);
  const isOptimal = ["optimal","normal"].includes(analysis.result.status);
  const isCritical = ["critical_high","critical_low","deficient"].includes(analysis.result.status);

  // Generate tailored recommendation based on answers
  function generateRecommendation() {
    const a = answers;
    const lines = [];
    const id = analysis.id;
    const status = analysis.result.status;

    // Context-adjusted interpretation
    if (id === "glucose") {
      if (a.fasted === "Yes, but less than 8 hours" || a.fasted === "No, I had eaten recently") {
        lines.push("⚠️ Context note: Since you were not fully fasted, this glucose reading may not reflect true fasting glucose. Retest after a proper 10-12 hour fast for an accurate baseline.");
      }
      if (a.stress === "Yes, high stress/illness") {
        lines.push("Acute stress and illness raise cortisol, which directly elevates blood glucose. Your result may be artificially elevated — retest when healthy and unstressed.");
      }
    }
    if (id === "alt" || id === "ast") {
      if (a.exercise_48h === "Yes — heavy resistance training or intense cardio") {
        lines.push("Context note: Intense exercise commonly elevates ALT and AST from muscle breakdown, not liver damage. The effect can persist 48-72 hours post-exercise. Retest 72 hours after your last hard session for an accurate liver reading.");
      }
      if (a.alcohol_week === "More than 7 drinks") {
        lines.push("Alcohol above 7 drinks per week is a significant driver of elevated liver enzymes. A 4-week alcohol-free period followed by a retest will clarify the contribution of alcohol to your results.");
      }
    }
    if (id === "triglycerides") {
      if (a.fasted === "8 hours or less" || a.fasted === "I had eaten") {
        lines.push("Critical context: Triglycerides are extremely sensitive to recent food intake. A non-fasted sample can read 2-3x higher than true fasting levels. This result requires confirmation with a 10-12 hour fasted sample before acting on it.");
        return lines;
      }
      if (a.alcohol_recent === "Yes — significant amount") {
        lines.push("Alcohol in the 48 hours before the test significantly elevates triglycerides — often by 50-100 mg/dL. Retest after 48 hours alcohol-free for your true baseline.");
      }
    }
    if (id === "creatinine") {
      if (a.hydration === "I may have been dehydrated" || a.hydration === "I exercised heavily without enough fluid replacement") {
        lines.push("Dehydration concentrates creatinine in the blood, producing a falsely elevated reading. Rehydrate fully and retest — drink 2L+ of water on the day of your next test.");
      }
    }
    if (id === "hemoglobin" && a.menstruation === "Yes — very heavy flow") {
      lines.push("Heavy menstrual periods are the most common cause of iron-deficiency anemia in women. Your hemoglobin result should be evaluated together with ferritin and serum iron to determine if iron supplementation is needed.");
    }
    if (id === "tsh" && a.time_of_draw && a.time_of_draw !== "Morning (before 10am)" && a.time_of_draw !== "Not sure") {
      lines.push("TSH is highest in the morning and declines through the day. An afternoon draw can read 0.5-1.0 mIU/L lower than a morning draw — always test TSH in the morning for consistent tracking.");
    }
    if (id === "vit_d" && a.skin_tone === "Dark / deep") {
      lines.push("Darker skin tones require significantly more UVB sun exposure to produce the same amount of Vitamin D as lighter skin — up to 6x more time in the sun. Supplementation is particularly important.");
    }
    if (id === "ldl" && a.fasted === "No, I had eaten") {
      lines.push("LDL from a non-fasted sample may be slightly different from a fasted result. However, a fasted sample is preferred for the most accurate lipid panel. Retest fasted if possible.");
    }

    // Primary recommendations based on status
    const adviceList = analysis.advice || [];
    if (adviceList.length > 0) {
      lines.push(...adviceList.slice(0,3));
    }

    // Escalation if still critical after context
    const contextExplains = lines.some(l => l.includes("Context note") || l.includes("Retest") || l.includes("Rehydrate"));
    if (isCritical && !contextExplains) {
      lines.push("🩺 We recommend consulting with a specialist (endocrinologist, cardiologist, or your primary care physician) to evaluate this result in the context of your full medical history.");
    } else if (isCritical && contextExplains) {
      lines.push("If after retesting under proper conditions this marker remains in the critical range, please consult a specialist for further evaluation.");
    }

    return lines;
  }

  const recommendation = step === "result" ? generateRecommendation() : [];
  const questions = info?.questions || [];
  const allAnswered = questions.every(q => answers[q.id]);

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:100, overflowY:"auto" }}>
      {/* Header */}
      <div style={{ padding:"52px 20px 16px", display:"flex", alignItems:"center", gap:14, borderBottom:`1px solid ${C.border}`, background:"#0c0c0c" }}>
        <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#666", cursor:"pointer", fontSize:18, padding:0, lineHeight:1 }}>←</button>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:12, color:"#444" }}>{CATEGORIES.find(c=>analysis.category===c.id)?.label}</div>
          <div style={{ fontSize:20, fontWeight:500, letterSpacing:"-0.3px" }}>{analysis.name}</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:28, fontWeight:400, color:col }}>{analysis.val}</div>
          <div style={{ fontSize:11, color:"#555" }}>{analysis.unit}</div>
        </div>
      </div>

      <div style={{ padding:"20px 20px 100px" }}>

        {/* Status badge */}
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20, padding:"12px 16px", borderRadius:12, background:col+"10", border:`1px solid ${col}25` }}>
          <div style={{ width:10, height:10, borderRadius:"50%", background:col, flexShrink:0 }} />
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:500, color:col }}>{STATUS_LABEL[analysis.result.status]}</div>
            <div style={{ fontSize:11, color:"#666", marginTop:1 }}>Your value: {analysis.val} {analysis.unit}</div>
          </div>
        </div>

        {/* Step: INFO */}
        {step === "info" && info && (
          <>
            <Section title="What is it?">
              <p style={{ fontSize:14, color:"#aaa", lineHeight:1.7, margin:0 }}>{info.what}</p>
            </Section>

            <Section title="Why does it matter?">
              <p style={{ fontSize:14, color:"#aaa", lineHeight:1.7, margin:0 }}>{info.why}</p>
            </Section>

            {info.longTerm && info.longTerm[analysis.result.status] && (
              <Section title="Long-term implications">
                <p style={{ fontSize:14, color:"#aaa", lineHeight:1.7, margin:0 }}>{info.longTerm[analysis.result.status]}</p>
              </Section>
            )}

            <Section title="Reference ranges (Mayo Clinic)">
              <MayoRangeTable markerId={analysis.id} sex={profile.sex} />
            </Section>

            <Section title="Source">
              <p style={{ fontSize:12, color:"#555", lineHeight:1.6, margin:0, fontStyle:"italic" }}>{info.source}</p>
              <div style={{ marginTop:10, padding:"8px 10px", background:"#0a0a0a", borderRadius:8, fontSize:11, color:"#444", lineHeight:1.6 }}>
                ⚠️ Reference ranges reflect where 95% of healthy people fall — 5% of healthy individuals will have results outside the range without any underlying condition. These are population averages; personalized ranges accounting for your age, sex, altitude, and lifestyle are more meaningful for tracking your health over time.
              </div>
            </Section>

            {isOptimal ? (
              <div style={{ background:C.teal+"10", border:`1px solid ${C.teal}25`, borderRadius:14, padding:"14px 16px" }}>
                <div style={{ fontSize:13, fontWeight:500, color:C.teal, marginBottom:6 }}>Looking great</div>
                {analysis.advice.slice(0,2).map((tip,i) => <div key={i} style={{ fontSize:13, color:"#888", lineHeight:1.6 }}>{tip}</div>)}
              </div>
            ) : (
              <button onClick={()=>setStep("questions")}
                style={{ width:"100%", padding:"13px 0", borderRadius:14, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:14, fontWeight:500 }}>
                Get personalized recommendations →
              </button>
            )}
          </>
        )}

        {/* Step: QUESTIONS */}
        {step === "questions" && (
          <>
            <div style={{ fontSize:14, color:"#666", marginBottom:20, lineHeight:1.6 }}>
              To give you accurate, context-aware recommendations, answer a few quick questions about this test.
            </div>
            {questions.map(q => (
              <div key={q.id} style={{ marginBottom:20 }}>
                <div style={{ fontSize:14, fontWeight:500, color:"#ccc", marginBottom:10, lineHeight:1.5 }}>{q.text}</div>
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  {q.options.map(opt => (
                    <button key={opt} onClick={()=>setAnswers(a=>({...a,[q.id]:opt}))}
                      style={{ padding:"10px 14px", borderRadius:10, border:`1px solid ${answers[q.id]===opt?C.teal:C.border}`, background:answers[q.id]===opt?C.teal+"15":"transparent", color:answers[q.id]===opt?C.teal:"#888", cursor:"pointer", fontSize:13, textAlign:"left" }}>
                      {opt}
                    </button>
                  ))}
                </div>
              </div>
            ))}
            <button onClick={()=>setStep("result")} disabled={!allAnswered}
              style={{ width:"100%", padding:"13px 0", borderRadius:14, background:C.teal, border:"none", color:"#000", cursor:"pointer", fontSize:14, fontWeight:500, opacity:allAnswered?1:0.4 }}>
              See my recommendations →
            </button>
          </>
        )}

        {/* Step: RESULT */}
        {step === "result" && (
          <>
            <Section title="Your personalized recommendations">
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {recommendation.map((tip,i) => (
                  <div key={i} style={{ fontSize:13, color:"#aaa", lineHeight:1.7, padding:"10px 14px", background:"#111", borderRadius:10, border:`1px solid ${C.border}` }}>
                    {tip}
                  </div>
                ))}
              </div>
            </Section>

            {info?.source && (
              <div style={{ marginTop:16, padding:"10px 14px", borderRadius:10, background:"#0a0a0a", border:`1px solid ${C.border}` }}>
                <div style={{ fontSize:11, color:"#444", fontStyle:"italic" }}>Based on: {info.source}</div>
              </div>
            )}

            <button onClick={()=>setStep("questions")} style={{ width:"100%", marginTop:16, padding:"11px 0", borderRadius:12, background:"transparent", border:`1px solid ${C.border}`, color:"#666", cursor:"pointer", fontSize:13 }}>
              ← Revise answers
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:8 }}>{title}</div>
      <div style={{ background:C.card, borderRadius:14, border:`1px solid ${C.border}`, padding:"14px 16px" }}>
        {children}
      </div>
    </div>
  );
}
